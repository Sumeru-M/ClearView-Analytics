            </div>
          )}

          {tab === "garch" && (
            <div className="card">
              <h3 style={{ marginBottom: 14 }}>Volatility Forecast (30 Days)</h3>
              <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
                <span className="badge badge-blue">Current Vol: {fmtPct(d.garch_current_vol)}</span>
                <span className="badge badge-blue">30d Forecast: {fmtPct(d.garch_30d_forecast)}</span>
              </div>
              {/* Simple SVG line chart */}
              {(() => {
                const pts = Object.entries(d.garch_forecast_path || {}).slice(0, 30);
                if (pts.length === 0) return <p style={{ color: "var(--text3)" }}>No forecast data.</p>;
                const W = 480, H = 200, PAD = { t: 20, r: 20, b: 30, l: 50 };
                const vals = pts.map(([, v]) => v.vol_ann * 100);
                const uppers = pts.map(([, v]) => v.ci_upper_95 * 100);
                const lowers = pts.map(([, v]) => v.ci_lower_95 * 100);
                const yMin = Math.min(...lowers) * 0.9, yMax = Math.max(...uppers) * 1.1;
                const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
                const px = i => PAD.l + (i / (pts.length - 1)) * cW;
                const py = v => PAD.t + (1 - (v - yMin) / (yMax - yMin)) * cH;
                const linePath = pts.map(([, v], i) => `${i === 0 ? "M" : "L"}${px(i).toFixed(1)},${py(v.vol_ann * 100).toFixed(1)}`).join(" ");
                const areaPath = [
                  ...pts.map(([, v], i) => `${i === 0 ? "M" : "L"}${px(i).toFixed(1)},${py(v.ci_upper_95 * 100).toFixed(1)}`),
                  ...pts.map(([, v], i) => `L${px(pts.length - 1 - i).toFixed(1)},${py(pts[pts.length - 1 - i][1].ci_lower_95 * 100).toFixed(1)}`),
                  "Z",
                ].join(" ");
                return (
                  <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", maxHeight: 200 }}>
                    <path d={areaPath} fill="var(--accent-bg-light)" />
                    <path d={linePath} fill="none" stroke="var(--accent)" strokeWidth={2} />
                    <text x={PAD.l - 4} y={PAD.t + 4} textAnchor="end" fontSize={10} fill="var(--text3)">{yMax.toFixed(1)}%</text>
                    <text x={PAD.l - 4} y={H - PAD.b} textAnchor="end" fontSize={10} fill="var(--text3)">{yMin.toFixed(1)}%</text>
                    <text x={PAD.l} y={H - 6} textAnchor="start" fontSize={10} fill="var(--text3)">Day 1</text>
                    <text x={W - PAD.r} y={H - 6} textAnchor="end" fontSize={10} fill="var(--text3)">Day {pts.length}</text>
                    <text x={W / 2} y={H} textAnchor="middle" fontSize={10} fill="var(--text3)">Annualised Volatility (%)</text>
                  </svg>
                );
              })()}
              <p style={{ fontSize: 13, color: "var(--text2)", marginTop: 12 }}>
                Volatility is expected to <strong style={{ color: "var(--text)" }}>{d.garch_30d_forecast > d.garch_current_vol ? "rise" : "fall"}</strong> from {fmtPct(d.garch_current_vol)} to {fmtPct(d.garch_30d_forecast)} over 30 days.

          {tab === "params" && (
            <div className="card">

              {[
                { l: "Return Chasing", v: d.adaptive_parameters?.lam_return, base: 1.0 },
                { l: "Risk Penalisation", v: d.adaptive_parameters?.lam_vol, base: 1.0 },
                { l: "Tail-Risk Limit", v: d.adaptive_parameters?.lam_cvar, base: 1.0 },
                { l: "Max Stock Weight", v: d.adaptive_parameters?.max_weight, base: 0.4 },

              ))}
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                <span className="badge badge-gray">Strategy: {d.adaptive_parameters?.optimization_method}</span>
                <span className="badge badge-gray">Entropy: {fmtMono(d.adaptive_parameters?.regime_entropy)}</span>
              </div>
              {(d.parameter_notes || []).map((note, i) => (
                <div key={i} className="card-sm" style={{ marginTop: 10, borderLeft: "3px solid var(--amber)" }}>
                  <p style={{ fontSize: 12, color: "var(--amber)" }}>{note}</p>
                </div>
              ))}
            </div>
          )}

          {tab === "weights" && (
            <div className="stack">
              <div className="grid-2">
                <div className="card"><WeightDonut weights={d.optimal_weights || {}} title="Regime-Optimal Allocation" /></div>
                <div className="grid-2">
                  <Metric label="Expected Return" value={fmtPct(d.portfolio_stats?.expected_return)} />

                  <Metric label="Sharpe Ratio" value={fmtMono(d.portfolio_stats?.sharpe_ratio)} />
                  <Metric label="Tail-Risk 95%" value={fmtPct(d.portfolio_stats?.cvar_95)} color="red" />
                </div>
              </div>
              <div className="card" style={{ overflowX: "auto" }}>
                <h3 style={{ marginBottom: 14 }}>Regime Probability Confidence Intervals</h3>
                <table>
                  <thead><tr><th>Regime</th><th className="td-right">Probability</th><th className="td-right">Lower 95%</th><th className="td-right">Upper 95%</th><th className="td-right">Certainty</th></tr></thead>
                  <tbody>
                    {Object.entries(d.uncertainty?.regime_ci || {}).map(([r, ci]) => (
                      <tr key={r}>
                        <td>{r}</td>
                        <td className="td-right td-mono">{(ci.mean * 100).toFixed(1)}%</td>
                        <td className="td-right td-mono">{(ci.lower_95 * 100).toFixed(1)}%</td>

                            {ci.half_width < 0.05 ? "Very certain" : ci.half_width < 0.15 ? "Fairly certain" : "Uncertain"}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="card">
                <h3 style={{ marginBottom: 14 }}>Weight Sensitivity to Regime Shifts</h3>
                {Object.entries(d.uncertainty?.weight_sensitivity || {}).sort((a, b) => b[1] - a[1]).map(([t, v]) => (
                  <div key={t} className="signal-row">
                    <span className="signal-label mono">{t.replace(".NS", "")}</span>
                    <div className="signal-bar">
                      <div className="signal-fill" style={{ width: `${clamp(v * 1000, 0, 100)}%`, background: "var(--accent)" }} />
                    </div>
                    <span className="signal-val">{fmtMono(v, 4)}</span>
                  </div>
                ))}
                <p style={{ fontSize: 12, color: "var(--text3)", marginTop: 10 }}>
                  Estimated market reset time: ~{Math.round(d.mixing_time_days || 0)} days ({((d.mixing_time_days || 0) / 252).toFixed(1)} years).
                </p>
              </div>
              <div className="card" style={{ marginTop: 20, background: "var(--bg3)" }}>
                <h4 style={{ marginBottom: 10 }}>Market Regime Concepts</h4>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 20px", fontSize: 13 }}>
                  <div><strong>ESS (Data Quality):</strong> 'Effective Sample Size'. Higher means the model has more useful historical data for this state.</div>
                  <div><strong>Mixing Time (Reset):</strong> The estimated number of days until the current regime signal naturally fades away.</div>
                  <div><strong>VaR (95% Confidence):</strong> 'Value at Risk'. The threshold where there is only a 5% chance of a worse loss.</div>
                  <div><strong>Deep Loss (CVaR):</strong> The average size of losses expected in extreme scenarios.</div>
                  <div><strong>HMM Fit:</strong> Indicates how well the regime model matches patterns in live price data.</div>
                  <div><strong>Weight Sensitivity:</strong> How much our weights would change if the market state shifted slightly.</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// SETTINGS
function Settings() {
  const [store, setState] = useStore();
  const [url, setUrl] = useState(BASE);
  const [online, setOnline] = useState(null);

  async function ping() {
    try {
      await apiGet("/api/health");
      setOnline(true);
    } catch { setOnline(false); }
  }

  useEffect(() => { ping(); }, []);

  function importPortfolioCsv(parsed) {
    const importedValue = parsed.entries.reduce((sum, entry) => {
      const shares = Number.isFinite(entry.shares) ? entry.shares : 0;
      const price = Number.isFinite(entry.price) ? entry.price : 0;
      return sum + shares * price;
    }, 0);
    setState({
      tickers: parsed.tickers,
      portfolioEntries: parsed.entries,
      portfolioValue: importedValue > 0 ? Math.round(importedValue) : store.portfolioValue,
    });
  }

  return (
    <div className="page fade-in">
      <div className="section-header">
        <h1 className="section-title">Workspace Settings</h1>
        <p className="section-sub">Manage your data, defaults, and connection settings.</p>
        <div className="section-line" />
      </div>
      <div className="stack">
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Portfolio Import</h3>
          <PortfolioCsvImport onImport={importPortfolioCsv} />
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Backend Connection</h3>
          <div style={{ marginBottom: 12 }}>
            <label>API Base URL</label>
            <input value={url} onChange={e => setUrl(e.target.value)} />
            <p style={{ fontSize: 11, color: "var(--text3)", marginTop: 4 }}>Uses same-origin API by default. Set <span className="mono">window.__VITE_API_BASE_URL</span> only if your API runs on another URL.</p>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button className="btn btn-sm btn-outline" onClick={ping}>Test Connection</button>
            {online !== null && (
              <span className={`badge ${online ? "badge-green" : "badge-red"}`}>{online ? "● Backend online" : "● Backend offline"}</span>
            )}
          </div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Default Portfolio</h3>
          <div className="form-grid">
            <div>
              <label>Risk-Free Rate (%)</label>
              <input type="number" value={+(store.riskFreeRate * 100).toFixed(4)} onChange={e => setState({ riskFreeRate: +e.target.value / 100 })} step="0.5" />
            </div>
            <div>
              <label>Portfolio Value (₹)</label>
              <input type="number" value={store.portfolioValue} onChange={e => setState({ portfolioValue: +e.target.value })} />
            </div>
          </div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 14 }}>Data</h3>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn btn-sm btn-outline" onClick={() => setState({
              m3: { result: null, status: "idle" }, m4: { result: null, status: "idle" },
              m5: { result: null, status: "idle" },
              m7: { result: null, status: "idle" },
            })}>Clear All Results</button>
            <button className="btn btn-sm btn-outline" onClick={() => { setState({ tickers: DEFAULT_PORTFOLIO_ENTRIES.map(entry => entry.ticker), portfolioEntries: DEFAULT_PORTFOLIO_ENTRIES, riskFreeRate: 0.07, portfolioValue: 1000000 }); }}>Reset Defaults</button>
          </div>
        </div>
        <div className="card">
          <h3 style={{ marginBottom: 10 }}>About ClearView Analytics</h3>
          <div style={{ fontSize: 13, color: "var(--text3)", lineHeight: 1.7 }}>
            <p>ClearView Analytics focuses on portfolio modeling, stress analytics, allocation analytics, and market regime analytics.</p>
            <p style={{ marginTop: 6 }}>This platform provides analytics, not financial advice. Decision responsibility always remains with the user.</p>
            <p style={{ marginTop: 6 }}>Backend: FastAPI + Python. Frontend: React.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser] = useState(() => {
    try {
      const raw = window.localStorage.getItem(AUTH_PROFILE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  });
  const [authBooting, setAuthBooting] = useState(true);
  const [authError, setAuthError] = useState("");
  const [page, setPage] = useState("dashboard");
  const [store] = useStore();

  const refreshAuthFromApi = useCallback(async () => {
    try {
      const data = await apiGet("/api/auth/me");
      if (data?.user?.username) {
        window.localStorage.setItem(AUTH_PROFILE_KEY, JSON.stringify(data.user));
        setAuthUser(data.user);
        setAuthError("");
        return true;
      }
    } catch (err) {
      setAuthError(err?.message || "Authentication failed.");
    }
    window.localStorage.removeItem(AUTH_PROFILE_KEY);
    setAuthUser(null);
    return false;
  }, []);

  useEffect(() => {
    function clearAuth() {
      window.localStorage.removeItem(AUTH_TOKEN_KEY);
      window.localStorage.removeItem(AUTH_PROFILE_KEY);
      setAuthUser(null);
    }

    window.addEventListener("clearview-auth-expired", clearAuth);
    const token = window.localStorage.getItem(AUTH_TOKEN_KEY);
    if (!token) {
      setAuthBooting(false);
      return () => window.removeEventListener("clearview-auth-expired", clearAuth);
    }
    refreshAuthFromApi().finally(() => setAuthBooting(false));

    return () => {
      window.removeEventListener("clearview-auth-expired", clearAuth);
    };
  }, [refreshAuthFromApi]);

  function handleAuthReady(authPayload) {
    const token = authPayload?.token || "";
    const user = authPayload?.user || null;
    if (!token || !user) {
      setAuthError("Authentication response was invalid.");
      return;
    }
    window.localStorage.setItem(AUTH_TOKEN_KEY, token);
    window.localStorage.setItem(AUTH_PROFILE_KEY, JSON.stringify(user));
    setAuthUser(user);
    setAuthError("");
  }

  function handleLogout() {
    window.localStorage.removeItem(AUTH_TOKEN_KEY);
    window.localStorage.removeItem(AUTH_PROFILE_KEY);
    setAuthUser(null);
    setPage("dashboard");
  }

  if (authBooting) {
    return (
      <div className="auth-shell">
        <div className="auth-panel">
          <p className="auth-sub">Checking your session...</p>
        </div>
      </div>
    );
  }

  if (!authUser) {
    return <LoginGate onAuthenticated={handleAuthReady} authError={authError} />;
  }

  const NAV = [
    { id: "dashboard", label: "Executive Dashboard", icon: "⌂", module: null },
    { id: "portfolio", label: "Performance & Risk", icon: "◎", module: "m3" },
    { id: "stress", label: "Stress Scenarios", icon: "⚡", module: "m4" },
    { id: "optimisation", label: "Allocation Strategy", icon: "⬡", module: "m5" },
    { id: "regime", label: "Regime Outlook", icon: "◉", module: "m7" },
    { id: "settings", label: "Settings", icon: "⚙", module: null },
  ];

  const PAGES = { dashboard: Dashboard, portfolio: Portfolio, stress: StressTest, optimisation: Optimisation, regime: Regime, settings: Settings };
  const PageComponent = PAGES[page] || Dashboard;

  const titles = {
    dashboard: "Executive Dashboard",
    portfolio: "Portfolio Performance & Risk",
    stress: "Stress Test Scenarios",
    optimisation: "Allocation Strategy Center",
    regime: "Market Regime Outlook",
    settings: "Workspace Settings",
  };

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">CV</div>
          <div className="logo-text">ClearView Analytics</div>
        </div>
        <div className="nav-section">Modules</div>
        {NAV.map(n => {
          const status = n.module ? store[n.module]?.status : null;
          return (
            <div key={n.id} className={`nav-item${page === n.id ? " active" : ""}`} onClick={() => setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span style={{ flex: 1 }}>{n.label}</span>
              {status && <div className={`nav-dot ${status}`} />}
            </div>
          );
        })}
        <div style={{ flex: 1 }} />
        <div style={{ padding: "16px 20px", borderTop: "1px solid var(--border)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
            <div className={`nav-dot ${store.backendOnline ? "success" : "error"}`} />
            <span style={{ fontSize: 11, color: "var(--text3)" }}>{store.backendOnline ? "Backend online" : "Backend offline"}</span>
          </div>
        </div>
      </aside>
      <div className="main">
        {!store.backendOnline && (
          <div className="offline-banner">
            Backend is not reachable right now. Check your backend URL in Settings.
          </div>
        )}
        <header className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          <div className="topbar-tickers">
            {store.tickers.map(t => <span key={t} className="ticker-pill">{t}</span>)}
          </div>
          <span className="badge badge-gray" style={{ marginRight: 8 }}>
            {(authUser?.username || authUser?.name || authUser?.email || "").trim()}
          </span>
          <button className="btn btn-sm btn-outline" onClick={handleLogout}>Sign Out</button>
          <div className="backend-badge">
            <div className={`backend-dot${store.backendOnline ? "" : " offline"}`} />
            <span>{store.backendOnline ? "Connected" : "Offline"}</span>
          </div>
        </header>
        <PageComponent setPage={setPage} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
