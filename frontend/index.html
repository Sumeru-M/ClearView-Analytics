<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearView Analytics | Portfolio Intelligence</title>
<!-- Favicon: inline SVG mirroring the in-app brand logo (purple gradient tile
     with the white partial ring used by .brand-logo). -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Cdefs%3E%3CradialGradient%20id='g'%20cx='32%25'%20cy='26%25'%20r='80%25'%3E%3Cstop%20offset='0%25'%20stop-color='%23d8b4fe'/%3E%3Cstop%20offset='45%25'%20stop-color='%23a855f7'/%3E%3Cstop%20offset='100%25'%20stop-color='%237c3aed'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect%20width='64'%20height='64'%20rx='20'%20fill='url(%23g)'/%3E%3Ccircle%20cx='32'%20cy='32'%20r='14'%20fill='none'%20stroke='%23ffffff'%20stroke-width='5'%20stroke-linecap='round'%20stroke-dasharray='66%2024'%20transform='rotate(35%2032%2032)'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* base surfaces */
  --bg:#08060f;
  --bg-grad-top:#1d0f38;
  --bg-grad-mid:#0c0818;
  --bg-grad-bot:#070510;
  --surface:#100b1d;
  --surface-2:#15102447;
  --surface-3:#1a1430;
  --panel:#0f0a1c;
  --border:#241a3d;
  --border-soft:#1b1430;
  --border-glow:#3a2a5e;
  /* text */
  --text:#f5f2fb;
  --text-dim:#b0a6cc;
  --text-mute:#71688c;
  /* brand */
  --accent:#a855f7;
  --accent-2:#c084fc;
  --accent-3:#7c3aed;
  --accent-4:#d8b4fe;
  --pink:#ec73c8;
  --blue:#6366f1;
  --cyan:#38bdf8;
  --green:#34d399;
  --red:#fb7185;
  --amber:#fbbf24;
  /* translucent helpers (rgba ok anywhere) */
  --shadow:rgba(0,0,0,0.45);
  --shadow-lg:rgba(8,4,20,0.6);
  --glass:rgba(168,85,247,0.07);
  --glass-2:rgba(168,85,247,0.12);
  --glass-border:rgba(168,85,247,0.20);
  --track:rgba(255,255,255,0.05);
  --white-1:rgba(255,255,255,0.035);
  --white-2:rgba(255,255,255,0.06);
  --white-3:rgba(255,255,255,0.10);
  --accent-soft:rgba(168,85,247,0.14);
  --green-soft:rgba(52,211,153,0.14);
  --red-soft:rgba(251,113,133,0.14);
  --amber-soft:rgba(251,191,36,0.14);
  --grid-line:rgba(255,255,255,0.05);
  /* fonts */
  --font-sans:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  /* layout */
  --radius:18px;
  --radius-sm:12px;
  --radius-lg:24px;
  --sidebar-w:248px;
}
html,body{height:100%}
body{
  font-family:var(--font-sans);
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
#root{height:100vh}
::selection{background:var(--accent-soft)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:var(--border-glow)}

/* ============ SHELL ============ */
.shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;
  background:
    radial-gradient(1200px 420px at 60% -8%, var(--bg-grad-top) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-grad-mid) 0%, var(--bg-grad-bot) 100%);
  position:relative;
}
.shell::before{
  content:"";position:absolute;top:0;left:var(--sidebar-w);right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--pink),transparent);
  opacity:.8;filter:blur(.5px);
}

/* ============ SIDEBAR ============ */
.sidebar{
  border-right:1px solid var(--border-soft);
  padding:18px 14px;
  display:flex;flex-direction:column;gap:6px;
  background:linear-gradient(180deg, rgba(20,12,38,0.55), rgba(10,7,22,0.25));
  overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:11px;padding:8px 8px 18px}
.brand-logo{
  width:34px;height:34px;border-radius:11px;flex:0 0 auto;
  background:radial-gradient(circle at 30% 25%, var(--accent-4), var(--accent) 45%, var(--accent-3) 100%);
  box-shadow:0 6px 18px var(--accent-soft), inset 0 0 8px rgba(255,255,255,0.25);
  position:relative;
}
.brand-logo::after{content:"";position:absolute;inset:9px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.85);border-right-color:transparent;transform:rotate(35deg)}
.brand-name{font-weight:700;font-size:16px;letter-spacing:-.2px}
.brand-name small{display:block;font-weight:500;font-size:10px;color:var(--text-mute);letter-spacing:.5px;text-transform:uppercase}
.nav-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-mute);padding:14px 10px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:var(--radius-sm);
  color:var(--text-dim);font-size:14px;font-weight:500;cursor:pointer;
  border:1px solid transparent;transition:all .15s ease;position:relative;
}
.nav-item:hover{background:var(--white-1);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,var(--glass-2),var(--glass));
  color:var(--text);border-color:var(--glass-border);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02), 0 4px 16px rgba(124,58,237,0.18);
}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:4px;background:linear-gradient(var(--accent),var(--pink))}
.nav-ico{width:18px;height:18px;flex:0 0 auto;opacity:.9}
.sidebar-spacer{flex:1}
.side-foot{
  margin-top:6px;padding:12px;border-radius:var(--radius-sm);
  background:var(--white-1);border:1px solid var(--border-soft);
  font-size:11.5px;color:var(--text-mute);line-height:1.5;
}

/* ============ MAIN ============ */
.main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:16px 28px;border-bottom:1px solid var(--border-soft);
  backdrop-filter:blur(8px);flex:0 0 auto;
}
.crumb{display:flex;align-items:center;gap:10px;color:var(--text-mute)}
.crumb-btn{width:30px;height:30px;border-radius:9px;border:1px solid var(--border);background:var(--white-1);color:var(--text-dim);display:grid;place-items:center;cursor:pointer;font-size:14px}
.crumb-btn:hover{background:var(--white-2);color:var(--text)}
.crumb-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.userchip{display:flex;align-items:center;gap:9px;padding:6px 12px 6px 6px;border-radius:30px;border:1px solid var(--border);background:var(--white-1);font-size:13px;color:var(--text-dim)}
.userav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:grid;place-items:center;font-weight:700;font-size:12px;color:var(--text)}

.page{flex:1;overflow-y:auto;padding:26px 28px 60px}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:9px 16px;border-radius:11px;font-family:var(--font-sans);
  font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);
  background:var(--white-1);color:var(--text-dim);transition:all .15s ease;white-space:nowrap;
}
.btn:hover{background:var(--white-2);color:var(--text)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{
  border:none;color:var(--text);
  background:linear-gradient(135deg,var(--accent-2),var(--accent) 45%,var(--accent-3));
  box-shadow:0 8px 22px rgba(124,58,237,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-primary:hover{filter:brightness(1.08);color:var(--text)}
.btn-ghost{background:transparent;border-color:var(--border)}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:9px}

/* ============ CARDS ============ */
.card{
  background:linear-gradient(180deg, var(--surface), var(--panel));
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;
  box-shadow:0 12px 30px var(--shadow);
}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.card-sub{font-size:12.5px;color:var(--text-mute);margin-top:3px}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.dotmenu{width:30px;height:30px;border-radius:9px;border:1px solid var(--border);background:var(--white-1);color:var(--text-mute);display:grid;place-items:center;cursor:default}

.grid{display:grid;gap:18px}
.metrics-row{grid-template-columns:repeat(4,1fr)}
.cols-2{grid-template-columns:1.55fr 1fr}
.cols-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1180px){.metrics-row{grid-template-columns:repeat(2,1fr)}.cols-2,.cols-3{grid-template-columns:1fr}}

/* ============ METRIC CARDS ============ */
.metric{
  background:linear-gradient(180deg, var(--surface), var(--panel));
  border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:18px;position:relative;overflow:hidden;
  box-shadow:0 12px 30px var(--shadow);
}
.metric.feature{
  background:
    radial-gradient(120% 120% at 90% -10%, rgba(192,132,252,0.28), transparent 55%),
    linear-gradient(160deg, rgba(124,58,237,0.30), rgba(20,12,38,0.6));
  border-color:var(--glass-border);
}
.metric-label{display:flex;align-items:center;gap:7px;font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-mute);font-weight:600}
.metric-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.metric-dot.g{background:var(--green)}
.metric-val{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:12px;font-family:var(--font-mono)}
.metric-foot{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;color:var(--text-mute)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;border:1px solid transparent}
.badge.up{background:var(--green-soft);color:var(--green)}
.badge.down{background:var(--red-soft);color:var(--red)}
.badge.neutral{background:var(--accent-soft);color:var(--accent-2)}
.badge.amber{background:var(--amber-soft);color:var(--amber)}

/* margin/sparkline card */
.split-metric{display:flex;align-items:stretch;gap:14px}
.split-metric .left{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center}
.split-metric .spark{flex:1;min-width:0;display:flex;align-items:center}
.big-pct{font-size:34px;font-weight:800;letter-spacing:-1.5px;font-family:var(--font-mono);line-height:1}
.big-pct small{font-size:16px;color:var(--text-mute);margin-left:3px}

/* distribution bars */
.dist-bars{display:flex;height:7px;border-radius:8px;overflow:hidden;background:var(--track);margin-bottom:16px}
.dist-legend{display:flex;flex-direction:column;gap:11px}
.dist-row{display:flex;align-items:center;justify-content:space-between;font-size:13px}
.dist-key{display:flex;align-items:center;gap:8px;color:var(--text-dim)}
.dist-swatch{width:9px;height:9px;border-radius:3px}
.dist-val{font-family:var(--font-mono);font-weight:600;color:var(--text)}

/* ============ TABS ============ */
.tabs{display:flex;gap:6px;padding:4px;background:var(--white-1);border:1px solid var(--border-soft);border-radius:13px;width:fit-content}
.tab{padding:8px 15px;border-radius:9px;font-size:13px;font-weight:600;color:var(--text-mute);cursor:pointer;border:1px solid transparent;transition:all .15s}
.tab:hover{color:var(--text-dim)}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent-3));color:var(--text);box-shadow:0 4px 14px rgba(124,58,237,0.4)}

/* ============ PARAM BAR ============ */
.parambar{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;margin-bottom:22px;padding:16px 18px;border-radius:var(--radius);background:var(--surface-2);border:1px solid var(--border-soft)}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-mute);font-weight:600}
.field input,.field select{
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:9px 12px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;transition:border .15s;
}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field.grow{flex:1;min-width:240px}
.field.grow input{font-family:var(--font-sans)}

/* ============ TABLE ============ */
table{border-collapse:collapse}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-mute);border-bottom:1px solid var(--border-soft);font-weight:600}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border-soft);color:var(--text-dim)}
.tbl tr:hover td{background:var(--white-1)}
.tbl tr.sel td{background:var(--accent-soft)}
.tbl .mono{font-family:var(--font-mono);color:var(--text)}
.pos{color:var(--green)}
.neg{color:var(--red)}

/* heatmap */
.heat-cell{font-family:var(--font-mono);font-size:11px;text-align:center;padding:0;border-radius:6px;color:var(--text)}
.heat-grid{display:grid;gap:4px}

/* ============ AUTH ============ */
.auth-shell{
  height:100vh;display:grid;place-items:center;padding:24px;
  background:
    radial-gradient(900px 500px at 50% -10%, var(--bg-grad-top), transparent 60%),
    linear-gradient(180deg, var(--bg-grad-mid), var(--bg-grad-bot));
}
.auth-card{
  width:100%;max-width:420px;background:linear-gradient(180deg,var(--surface),var(--panel));
  border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:34px 32px;
  box-shadow:0 30px 80px var(--shadow-lg);
}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.auth-h{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:18px}
.auth-p{font-size:13.5px;color:var(--text-mute);margin-top:6px;margin-bottom:22px}
.auth-tabs{display:flex;gap:6px;margin-bottom:20px;padding:4px;background:var(--white-1);border-radius:12px;border:1px solid var(--border-soft)}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--text-mute)}
.auth-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent-3));color:var(--text)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:7px;font-weight:500}
.auth-field input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border .15s}
.auth-field input:focus{border-color:var(--accent)}
.auth-err{background:var(--red-soft);border:1px solid rgba(251,113,133,0.3);color:var(--red);padding:10px 13px;border-radius:10px;font-size:12.5px;margin-bottom:14px}
.auth-foot{text-align:center;font-size:11.5px;color:var(--text-mute);margin-top:20px;line-height:1.6}

/* ============ MISC ============ */
.spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--white-3);border-top-color:var(--accent);animation:spin .7s linear infinite;display:inline-block}
.spinner.lg{width:34px;height:34px;border-width:3.5px}
@keyframes spin{to{transform:rotate(360deg)}}
.center-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:70px 20px;color:var(--text-mute);text-align:center}
.center-state .title{color:var(--text-dim);font-weight:600;font-size:15px}
.empty-ico{width:54px;height:54px;border-radius:16px;background:var(--accent-soft);display:grid;place-items:center}
.error-banner{background:var(--red-soft);border:1px solid rgba(251,113,133,0.3);color:var(--red);padding:13px 16px;border-radius:12px;font-size:13px;margin-bottom:18px;display:flex;gap:10px;align-items:center}
.welcome-h{font-size:25px;font-weight:800;letter-spacing:-.6px}
.welcome-p{font-size:14px;color:var(--text-mute);margin-top:5px}
.section-gap{margin-top:18px}
.pill{font-family:var(--font-mono);font-size:11px;padding:2px 8px;border-radius:6px;background:var(--white-2);color:var(--text-dim)}
.chart-tooltip{position:absolute;pointer-events:none;background:var(--surface-3);border:1px solid var(--border-glow);border-radius:10px;padding:8px 11px;font-size:11.5px;box-shadow:0 10px 30px var(--shadow);z-index:5;font-family:var(--font-mono);color:var(--text);white-space:nowrap}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--text-mute)}
.legend-item{display:flex;align-items:center;gap:7px}
.legend-dot{width:9px;height:9px;border-radius:3px}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--text-mute)}
.kv .v{font-family:var(--font-mono);color:var(--text);font-weight:600}
.regime-banner{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:var(--radius);background:linear-gradient(120deg,var(--glass-2),var(--glass));border:1px solid var(--glass-border);margin-bottom:18px}
.regime-orb{width:48px;height:48px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 24px var(--accent-soft)}
</style>
</head>
<body>
<div id="root"></div>

<!--
  Boot note (do NOT change to type="text/babel"): React/ReactDOM load as UMD
  globals, and the unpinned @babel/standalone CDN defaults preset-react to the
  *automatic* JSX runtime (require("react/jsx-runtime")) which has no browser
  module loader -> blank page. The bootstrap below forces the *classic* runtime
  (React.createElement), which works with UMD React.
-->
<script type="text/jsx-classic" id="cv-app-src">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ---------------- helpers ---------------- */
const API = "";
const TOKEN_KEY = "cv_token";

async function apiCall(path, { method = "GET", body, token } = {}) {
  const headers = {};
  if (body) headers["Content-Type"] = "application/json";
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const msg = (data && (data.error || data.detail)) || ("Request failed (" + res.status + ")");
    throw new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
  }
  if (data && data.error) throw new Error(data.error);
  return data;
}

const pct = (x, d = 2) => (x === null || x === undefined || isNaN(x)) ? "—" : (x * 100).toFixed(d) + "%";
const signedPct = (x, d = 2) => (x === null || x === undefined || isNaN(x)) ? "—" : (x >= 0 ? "+" : "") + (x * 100).toFixed(d) + "%";
const num = (x, d = 2) => (x === null || x === undefined || isNaN(x)) ? "—" : Number(x).toFixed(d);
const money = (x) => {
  if (x === null || x === undefined || isNaN(x)) return "—";
  const v = Number(x);
  const abs = Math.abs(v);
  let s;
  if (abs >= 1e7) s = "₹" + (v / 1e7).toFixed(2) + " Cr";
  else if (abs >= 1e5) s = "₹" + (v / 1e5).toFixed(2) + " L";
  else s = "₹" + v.toLocaleString("en-IN", { maximumFractionDigits: 0 });
  return s;
};
const initials = (name) => (name || "?").slice(0, 2).toUpperCase();
const ASSET_COLORS = ["#a855f7", "#ec73c8", "#6366f1", "#38bdf8", "#34d399", "#fbbf24", "#fb7185", "#c084fc"];

/* ---------------- icons ---------------- */
function Ico({ d, size = 18 }) {
  return (
    <svg className="nav-ico" width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {d}
    </svg>
  );

/* ---------------- sparkline ---------------- */
function Sparkline({ values, color = "var(--accent-2)", height = 56, fill = true }) {
  const W = 220, H = height;
  if (!values || values.length < 2) return <svg width="100%" height={H} viewBox={"0 0 " + W + " " + H} />;
  const min = Math.min(...values), max = Math.max(...values);
  const rng = max - min || 1;
  const step = W / (values.length - 1);
  const pts = values.map((v, i) => [i * step, H - 8 - ((v - min) / rng) * (H - 16)]);
  const line = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = line + " L" + W + " " + H + " L0 " + H + " Z";
  const gid = "sg" + Math.round(min * 1e6 + max);
  return (
    <svg width="100%" height={H} viewBox={"0 0 " + W + " " + H} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {fill && <path d={area} fill={"url(#" + gid + ")"} />}
      <path d={line} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="3.2" fill={color} />
    </svg>
  );
}

/* ---------------- CSV portfolio parsing ---------------- */
// Split one CSV line into fields, respecting double-quoted values.
function splitCsvLine(line) {
  const out = []; let cur = ""; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else if (ch === '"') { inQ = true; }
    else if (ch === "," || ch === ";" || ch === "\t") { out.push(cur); cur = ""; }
    else cur += ch;
  }
  out.push(cur);
  return out.map(s => s.trim());
}
// Parse a holdings CSV into [{ticker, value}]. Handles broker exports
// (Zerodha/Groww style) by locating the ticker + invested-value columns from
// the header rather than blindly concatenating columns.
function parsePortfolioCsv(text) {
  const rows = text.split(/\r?\n/).filter(l => l.trim() !== "").map(splitCsvLine);
  if (!rows.length) return [];
  const numOf = (s) => {
    const n = parseFloat(String(s == null ? "" : s).replace(/[^0-9.\-]/g, ""));
    return isNaN(n) ? null : n;
  };

  const first = rows[0];
  const headerCells = first.map(h => h.toLowerCase().replace(/[^a-z0-9]/g, ""));
  const looksHeader =
    first.slice(1).every(c => numOf(c) === null) ||
    /instrument|ticker|symbol|stock|scrip|name|invest|qty|cost|ltp|value/i.test(first.join(" "));

  let tickerIdx = 0, valueIdx = -1, qtyIdx = -1, priceIdx = -1, start = 0;
  if (looksHeader) {
    start = 1;
    const find = (cands) => headerCells.findIndex(h => cands.some(c => h === c || h.includes(c)));
    const ti = find(["instrument", "ticker", "symbol", "stock", "scrip", "name"]);
    if (ti >= 0) tickerIdx = ti;
    // Prefer an explicit invested/market-value column, in priority order.
    for (const key of ["invested", "investment", "investedvalue", "currentvalue", "curval", "marketvalue", "value", "amount"]) {
      const idx = headerCells.findIndex((h, j) => j !== tickerIdx && (h === key || h.includes(key)));
      if (idx >= 0) { valueIdx = idx; break; }
    }
    // Fallbacks for computing value = qty * price when no value column exists.
    qtyIdx = find(["qty", "quantity", "units", "shares"]);
    priceIdx = headerCells.findIndex((h, j) => j !== tickerIdx && (h.includes("avgcost") || h.includes("avgprice") || h.includes("buyprice") || h === "price" || h.includes("ltp")));
  }

  const holdings = [];
  for (let i = start; i < rows.length; i++) {
    const cols = rows[i];
    if (!cols.length) continue;
    const ticker = (cols[tickerIdx] || "").toUpperCase().replace(/['"]/g, "").trim();
    let value = valueIdx >= 0 ? numOf(cols[valueIdx]) : null;
    if (value == null && qtyIdx >= 0 && priceIdx >= 0) {
      const q = numOf(cols[qtyIdx]), p = numOf(cols[priceIdx]);
      if (q != null && p != null) value = q * p;
    }
    if (value == null) {
      // last resort: first numeric column after the ticker
      for (let j = 0; j < cols.length; j++) {
        if (j === tickerIdx) continue;
        const v = numOf(cols[j]);
        if (v != null) { value = v; break; }
      }
    }
    if (!ticker || value == null || value <= 0) continue;
    holdings.push({ ticker, value });
  }
  return holdings;
}
function buildPortfolio(holdings) {
  const total = holdings.reduce((s, h) => s + h.value, 0);
  const withWeights = holdings.map(h => ({ ...h, weight: total > 0 ? h.value / total : 0 }));
  return { holdings: withWeights, total, updatedAt: Date.now() };
}

/* ---------------- portfolio allocation donut ---------------- */
function PieChart({ holdings, total }) {
  const [hover, setHover] = useState(null);
  const data = (holdings || []).filter(h => h.value > 0);
  if (!data.length) {
    return <div className="center-state" style={{ padding: "30px" }}><span style={{ color: "var(--text-mute)" }}>Upload your portfolio CSV to see your allocation.</span></div>;
  }
  const sum = total || data.reduce((s, h) => s + h.value, 0);
  const cx = 130, cy = 130, R = 108, rIn = 64;
  let a = -Math.PI / 2;
  const slices = data.map((h, i) => {
    const frac = h.value / sum;
    const a0 = a, a1 = a + frac * Math.PI * 2; a = a1;
    const big = (a1 - a0) > Math.PI ? 1 : 0;
    const grow = hover === i ? 7 : 0;
    const mid = (a0 + a1) / 2, ox = Math.cos(mid) * grow, oy = Math.sin(mid) * grow;
    const x0 = cx + ox + R * Math.cos(a0), y0 = cy + oy + R * Math.sin(a0);
    const x1 = cx + ox + R * Math.cos(a1), y1 = cy + oy + R * Math.sin(a1);
    const xi1 = cx + ox + rIn * Math.cos(a1), yi1 = cy + oy + rIn * Math.sin(a1);
    const xi0 = cx + ox + rIn * Math.cos(a0), yi0 = cy + oy + rIn * Math.sin(a0);
    const d = "M" + x0 + " " + y0 + " A" + R + " " + R + " 0 " + big + " 1 " + x1 + " " + y1 +
              " L" + xi1 + " " + yi1 + " A" + rIn + " " + rIn + " 0 " + big + " 0 " + xi0 + " " + yi0 + " Z";
    return { d, color: ASSET_COLORS[i % ASSET_COLORS.length], frac, h, i };
  });
  const focus = hover != null ? slices[hover] : null;
  return (
    <div style={{ display: "flex", gap: 20, alignItems: "center", flexWrap: "wrap" }}>
      <svg width="260" height="260" viewBox="0 0 260 260" style={{ flex: "0 0 auto" }}>
        {slices.map(s => (
          <path key={s.i} d={s.d} fill={s.color} opacity={hover == null || hover === s.i ? 1 : 0.4}
            onMouseEnter={() => setHover(s.i)} onMouseLeave={() => setHover(null)}
            style={{ cursor: "pointer", transition: "opacity .15s" }} />
        ))}
        <text x={cx} y={cy - 8} textAnchor="middle" fontSize="11" fill="var(--text-mute)">{focus ? focus.h.ticker.replace(".NS", "") : "Total Value"}</text>
        <text x={cx} y={cy + 15} textAnchor="middle" fontSize="19" fontWeight="700" fill="var(--text)" fontFamily="var(--font-mono)">{focus ? pct(focus.frac) : money(sum)}</text>
        {focus && <text x={cx} y={cy + 33} textAnchor="middle" fontSize="11" fill="var(--text-dim)" fontFamily="var(--font-mono)">{money(focus.h.value)}</text>}
      </svg>
      <div className="dist-legend" style={{ flex: 1, minWidth: 200 }}>
        {data.map((h, i) => (
          <div className="dist-row" key={h.ticker} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
            <span className="dist-key"><span className="dist-swatch" style={{ background: ASSET_COLORS[i % ASSET_COLORS.length] }} />{h.ticker.replace(".NS", "")}</span>
            <span style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <span style={{ color: "var(--text-mute)", fontFamily: "var(--font-mono)", fontSize: 12 }}>{money(h.value)}</span>
              <span className="dist-val">{pct(h.value / sum)}</span>
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------------- allocation distribution ---------------- */
function Distribution({ weights }) {
  const entries = Object.entries(weights || {}).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return <div style={{ color: "var(--text-mute)", fontSize: 13 }}>No allocation</div>;
  return (
    <div>
      <div className="dist-bars">
        {entries.map(([t, w], i) => (
          <div key={t} style={{ width: (w * 100) + "%", background: ASSET_COLORS[i % ASSET_COLORS.length] }} />
        ))}
      </div>
      <div className="dist-legend">
        {entries.map(([t, w], i) => (
          <div className="dist-row" key={t}>

            <span className="dist-val">{pct(w)}</span>
          </div>

}

/* ---------------- correlation heatmap ---------------- */
function Heatmap({ matrix }) {
  const keys = Object.keys(matrix || {});
  if (!keys.length) return <div style={{ color: "var(--text-mute)", fontSize: 13 }}>No correlation data</div>;
  const color = (v) => {
    if (v >= 0) { const a = 0.12 + v * 0.6; return "rgba(168,85,247," + a.toFixed(2) + ")"; }
    const a = 0.12 + Math.abs(v) * 0.6; return "rgba(56,189,248," + a.toFixed(2) + ")";
  };
  const cell = Math.min(54, Math.floor(420 / (keys.length + 1)));
  return (
    <div style={{ overflowX: "auto" }}>
      <div className="heat-grid" style={{ gridTemplateColumns: "56px repeat(" + keys.length + ", " + cell + "px)" }}>
        <div />
        {keys.map(k => <div key={"h" + k} style={{ fontSize: 10, color: "var(--text-mute)", textAlign: "center", fontFamily: "var(--font-mono)", paddingBottom: 4 }}>{k.replace(".NS", "")}</div>)}
        {keys.map(r => (
          <React.Fragment key={r}>
            <div style={{ fontSize: 10, color: "var(--text-mute)", display: "flex", alignItems: "center", fontFamily: "var(--font-mono)" }}>{r.replace(".NS", "")}</div>
            {keys.map(c => (
              <div key={r + c} className="heat-cell" style={{ background: color(matrix[r][c]), height: cell, lineHeight: cell + "px" }}>
                {num(matrix[r][c], 2)}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function OptimizerView({ m5, pv, loading, error }) {
  const [sel, setSel] = useState(null);
  if (loading) return <CenterLoading label="Running institutional optimisation…" />;
  if (error) return <ErrBanner msg={error} />;
  if (!m5) return <EmptyState label="Run the institutional optimiser" />;

  const methods = m5.methods || {};
  const methodKeys = Object.keys(methods);
  const best = (m5.best_method && methods[m5.best_method]) ? m5.best_method : methodKeys[0];
  const active = (sel && methods[sel]) ? sel : best;
  const cur = methods[active] || {};
  const attr = m5.risk_attribution || {};
  const pretty = (k) => (k || "").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  const value = parseFloat(pv) || 0;
  const holdings = Object.entries(cur.weights || {})
    .map(([t, w]) => ({ ticker: t, value: value > 0 ? w * value : w, weight: w }))
    .filter(h => h.weight > 0.0001)
    .sort((a, b) => b.weight - a.weight);

  if (!methodKeys.length) return <EmptyState label="No optimisation methods returned" />;

  return (
    <div>
      <div className="grid metrics-row" style={{ marginBottom: 4 }}>
        <div className="metric feature">
          <div className="metric-label"><span className="metric-dot" />Selected Method</div>
          <div className="metric-val" style={{ fontSize: 22 }}>{pretty(active)}</div>
          <div className="metric-foot">{active === best ? <span className="badge up">Highest Sharpe ratio</span> : <span className="badge neutral">Alternative method</span>}</div>
        </div>
        <MetricCard label="Expected Return" value={pct(cur.expected_return)} dotClass="g" sub="annualised" />
        <MetricCard label="Volatility" value={pct(cur.volatility)} sub="annualised" />
        <MetricCard label="Sharpe Ratio" value={num(cur.sharpe_ratio)} sub={"CVaR " + pct(cur.cvar_95)} />
      </div>

      <div className="grid cols-2 section-gap">
        {/* interactive allocation pie */}
        <div className="card">
          <div className="card-head">
            <div><div className="card-title">Portfolio Allocation</div><div className="card-sub">Pick a method to view its allocation</div></div>
          </div>
          <div className="tabs" style={{ marginBottom: 18, flexWrap: "wrap" }}>
            {methodKeys.map(k => (
              <div key={k} className={"tab" + (active === k ? " active" : "")} onClick={() => setSel(k)}>{pretty(k)}</div>
            ))}
          </div>
          <PieChart holdings={holdings} total={value > 0 ? value : undefined} />
        </div>

        {/* clickable comparison */}
        <div className="card">
          <div className="card-head"><div><div className="card-title">Method Comparison</div><div className="card-sub">Click a method to load its allocation</div></div></div>
          <table className="tbl">
            <thead><tr><th>Method</th><th>Return</th><th>Vol</th><th>Sharpe</th></tr></thead>
            <tbody>
              {methodKeys.map(k => (
                <tr key={k} onClick={() => setSel(k)} style={{ cursor: "pointer" }} className={active === k ? "sel" : ""}>
                  <td style={{ color: active === k ? "var(--accent-2)" : "var(--text-dim)", fontWeight: 600 }}>
                    {pretty(k)}{k === best ? <span className="badge up" style={{ marginLeft: 8 }}>Top Sharpe</span> : null}
                  </td>
                  <td className="mono pos">{pct(methods[k].expected_return)}</td>
                  <td className="mono">{pct(methods[k].volatility)}</td>
                  <td className="mono">{num(methods[k].sharpe_ratio)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="legend-row">
            <div className="legend-item">Diversification ratio <span className="pill">{num(attr.diversification_ratio)}</span></div>
            <div className="legend-item">Effective N <span className="pill">{num(attr.effective_n, 1)}</span></div>
          </div>
        </div>
      </div>

      {cur.rebalance_actions && cur.rebalance_actions.length ? (
        <div className="card section-gap">
          <div className="card-head"><div>
            <div className="card-title">Rebalance Worksheet — {pretty(active)}</div>
            <div className="card-sub">How your current holdings differ from the {pretty(active)} weights. This is information only, not a recommendation — decide what, if anything, to act on yourself.</div>
          </div></div>
          <table className="tbl">
            <thead><tr><th>Ticker</th><th>Current</th><th>{pretty(active)} weight</th><th>Difference (₹)</th><th>Direction</th></tr></thead>
            <tbody>
              {cur.rebalance_actions.map((r, i) => {
                const act = (r.action || "").toUpperCase();

function StressView({ m4, loading, error }) {
  if (loading) return <CenterLoading label="Propagating macro shocks…" />;
  if (error) return <ErrBanner msg={error} />;
  if (!m4) return <EmptyState label="Run stress scenarios" />;
  const sum = m4.summary || {};
  const rm = m4.risk_metrics || {};
  const rows = (m4.scenarios_tested || []).slice().sort((a, b) => a.pnl_pct - b.pnl_pct);
  const worstMag = Math.max(...rows.map(r => Math.abs(r.pnl_pct)), 0.0001);
  return (
    <div>
      <ErrBanner msg={null} />
      <div className="grid metrics-row" style={{ marginBottom: 4 }}>
        <MetricCard feature label="Overall Risk Level" value={<span style={{ fontSize: 21 }}>{sum.risk_level || "—"}</span>} sub={sum.risk_message || ""} />
        <MetricCard label="Worst-case Loss" value={pct(sum.worst_loss ? sum.worst_loss.pnl_pct : null)} dotClass="" badge={sum.worst_loss ? money(sum.worst_loss.pnl_inr) : ""} badgeType="down" sub={sum.worst_loss ? sum.worst_loss.scenario : ""} />
        <MetricCard label="VaR (95%)" value={pct(rm.var_parametric_pct)} sub={money(rm.var_parametric_inr)} />
        <MetricCard label="CVaR (95%)" value={pct(rm.cvar_pct)} sub={money(rm.cvar_inr)} />
      </div>

      <div className="card section-gap">
        <div className="card-head"><div><div className="card-title">Scenario Impact</div><div className="card-sub">{rows.length} macro scenarios · P&amp;L on {money(m4.portfolio_value)}</div></div></div>
        <table className="tbl">
          <thead><tr><th>Scenario</th><th>Category</th><th>Return Δ</th><th>P&amp;L %</th><th style={{ width: 180 }}>Impact</th><th>P&amp;L</th></tr></thead>
          <tbody>
            {rows.map((r, i) => {
              const w = (Math.abs(r.pnl_pct) / worstMag) * 100;
              const neg = r.pnl_pct < 0;
              return (
                <tr key={i}>
                  <td style={{ color: "var(--text)", fontWeight: 600 }}>{r.name}</td>
                  <td>{r.category}</td>
                  <td className={"mono " + (r.return_change >= 0 ? "pos" : "neg")}>{signedPct(r.return_change)}</td>
                  <td className={"mono " + (neg ? "neg" : "pos")}>{signedPct(r.pnl_pct)}</td>
                  <td>
                    <div style={{ height: 8, background: "var(--track)", borderRadius: 6, overflow: "hidden" }}>
                      <div style={{ width: w + "%", height: "100%", background: neg ? "linear-gradient(90deg,var(--red),var(--pink))" : "linear-gradient(90deg,var(--green),var(--cyan))" }} />
                    </div>
                  </td>
                  <td className={"mono " + (neg ? "neg" : "pos")}>{money(r.pnl_inr)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function RegimeView({ m7, loading, error }) {
  if (loading) return <CenterLoading label="Fitting HMM + GARCH regime model… (this can take a few seconds)" />;
  if (error) return <ErrBanner msg={error} />;
  if (!m7) return <EmptyState label="Detect the current market regime" />;

  // api_m7 returns a FLAT structure (see portfolio/api_m7.py):
  const label = m7.current_regime || "Unknown";
  const probs = m7.regime_probabilities || {};                 // { regime: prob }
  const fwd = m7.forward_regime_probs || {};                   // { "1d": { regime: prob }, ... }
  const path = m7.garch_forecast_path || {};                   // { day: { vol_ann, ci_* } }
  const weights = m7.optimal_weights || {};                    // { ticker: weight }
  const stats = m7.portfolio_stats || {};
  const currentVol = m7.garch_current_vol;
  const forecast30 = m7.garch_30d_forecast;

  // Colour/abbreviate regimes by keyword so any label the engine produces
  // (e.g. "Range-Bound", "Steady Bull", "High-Vol / Choppy") still renders
  // sensibly — labels are chosen dynamically from absolute market conditions.
  const regimeColor = (k) => {
    const s = (k || "").toLowerCase();
    if (s.includes("crisis")) return "var(--red)";
    if (s.includes("bear")) return "var(--amber)";
    if (s.includes("choppy") || s.includes("range")) return "var(--cyan)";
    if (s.includes("bull")) return "var(--green)";
    return "var(--accent-2)";
  };
  const regimeAbbrev = (k) => {
    const s = (k || "").toLowerCase();
    if (s.includes("crisis")) return "Crisis";
    if (s.includes("bear")) return "Bear";
    if (s.includes("choppy") || s.includes("range")) return "Choppy";
    if (s.includes("bull")) return "Bull";
    if (s.includes("trans")) return "Trans.";
    return (k || "").slice(0, 6);
  };
  const orbColor = regimeColor(label);

  const horizons = ["1d", "5d", "10d", "21d", "63d"].filter(h => fwd[h] && Object.keys(fwd[h]).length);
  const regimeNames = Object.keys(probs).length ? Object.keys(probs) : (horizons.length ? Object.keys(fwd[horizons[0]]) : []);
  const volPath = Object.keys(path)
    .sort((a, b) => parseFloat(a) - parseFloat(b))
    .map(k => path[k].vol_ann)
    .filter(v => v != null);

  return (
    <div>
      <div className="regime-banner">
        <div className="regime-orb" style={{ background: "radial-gradient(circle at 30% 30%, var(--accent-4), " + orbColor + ")" }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, color: "var(--text-mute)", textTransform: "uppercase", letterSpacing: ".6px", fontWeight: 600 }}>Current Market Regime</div>
          <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: "-.5px", marginTop: 3 }}>{label}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 12, color: "var(--text-mute)" }}>GARCH Volatility</div>
          <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "var(--font-mono)" }}>{pct(currentVol)}</div>
        </div>
      </div>

      <div className="grid cols-2">
        <div className="card">
          <div className="card-head"><div><div className="card-title">Regime Probabilities</div><div className="card-sub">Current posterior distribution</div></div></div>
          {regimeNames.length ? (
            <div className="dist-legend">
              {regimeNames.map(k => {
                const v = probs[k] || 0;
                return (
                  <div key={k}>
                    <div className="dist-row" style={{ marginBottom: 6 }}>
                      <span className="dist-key"><span className="dist-swatch" style={{ background: regimeColor(k) }} />{k}</span>
                      <span className="dist-val">{pct(v)}</span>
                    </div>
                    <div style={{ height: 7, background: "var(--track)", borderRadius: 6, overflow: "hidden", marginBottom: 12 }}>
                      <div style={{ width: (v * 100) + "%", height: "100%", background: regimeColor(k) }} />
                    </div>
                  </div>
                );
              })}
            </div>
          ) : <div style={{ color: "var(--text-mute)", fontSize: 13 }}>No regime probabilities returned.</div>}
        </div>

        <div className="card">
          <div className="card-head"><div><div className="card-title">Volatility Forecast</div><div className="card-sub">Annualised GARCH path</div></div></div>
          <div style={{ marginTop: 8 }}><Sparkline values={volPath} color="var(--amber)" height={80} /></div>
          <div className="kv" style={{ marginTop: 12 }}><span className="k">Current Vol</span><span className="v">{pct(currentVol)}</span></div>
          <div className="kv"><span className="k">30-day Forecast</span><span className="v">{pct(forecast30)}</span></div>
          {m7.mixing_time_days ? <div className="kv"><span className="k">Mixing Time</span><span className="v">{m7.mixing_time_days} d</span></div> : null}
        </div>
      </div>

      <div className="grid cols-2 section-gap">
        <div className="card">
          <div className="card-head"><div><div className="card-title">Forward Regime Probabilities</div><div className="card-sub">Projected by horizon</div></div></div>
          {horizons.length && regimeNames.length ? (
            <table className="tbl">
              <thead><tr><th>Horizon</th>{regimeNames.map(k => <th key={k}>{regimeAbbrev(k)}</th>)}</tr></thead>
              <tbody>
                {horizons.map(h => (
                  <tr key={h}>
                    <td className="mono" style={{ color: "var(--text)" }}>{h}</td>
                    {regimeNames.map(k => <td key={k} className="mono">{pct((fwd[h] || {})[k], 1)}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div style={{ color: "var(--text-mute)", fontSize: 13 }}>No forward projections returned.</div>}
        </div>

        <div className="card">
          <div className="card-head"><div><div className="card-title">Regime-Aware Allocation</div><div className="card-sub">{stats.optimization_type ? stats.optimization_type.replace(/_/g, " ") : "Adaptive weights"}</div></div></div>
          <Distribution weights={weights} />
          <div className="kv" style={{ marginTop: 8 }}><span className="k">Expected Return</span><span className="v">{pct(stats.expected_return)}</span></div>
          <div className="kv"><span className="k">Volatility</span><span className="v">{pct(stats.volatility)}</span></div>
          <div className="kv"><span className="k">Sharpe Ratio</span><span className="v">{num(stats.sharpe_ratio)}</span></div>
          <div className="kv"><span className="k">CVaR (95%)</span><span className="v neg">{pct(stats.cvar_95)}</span></div>
        </div>
      </div>
    </div>
  );
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setBusy(true);
    try {
      let data;
      if (mode === "login") {
        data = await apiCall("/api/auth/login", { method: "POST", body: { username, password } });
      } else {
        data = await apiCall("/api/auth/register", { method: "POST", body: { username, email, password } });
      }
      localStorage.setItem(TOKEN_KEY, data.token);
      onAuthed(data.token, data.user);
    } catch (e2) {
      setErr(e2.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="auth-shell">
      <div className="auth-card">
        <div className="auth-brand">
          <div className="brand-logo" />
          <div className="brand-name">ClearView<small>Analytics</small></div>
        </div>
        <div className="auth-h">{mode === "login" ? "Welcome back" : "Create your account"}</div>
        <div className="auth-p">{mode === "login" ? "Sign in to access your portfolio intelligence cockpit." : "Join to run institutional-grade portfolio analytics."}</div>

        <div className="auth-tabs">
          <div className={"auth-tab" + (mode === "login" ? " active" : "")} onClick={() => { setMode("login"); setErr(""); }}>Sign In</div>
          <div className={"auth-tab" + (mode === "register" ? " active" : "")} onClick={() => { setMode("register"); setErr(""); }}>Register</div>
        </div>

        {err && <div className="auth-err">{err}</div>}

        <form onSubmit={submit}>
          <div className="auth-field">
            <label>Username{mode === "login" ? " or Email" : ""}</label>
            <input value={username} onChange={e => setUsername(e.target.value)} placeholder="quant_analyst" autoComplete="username" />
          </div>
          {mode === "register" && (
            <div className="auth-field">
              <label>Email</label>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@firm.com" autoComplete="email" />
            </div>
          )}
          <div className="auth-field">
            <label>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" autoComplete={mode === "login" ? "current-password" : "new-password"} />
          </div>
          <button type="submit" className="btn btn-primary" style={{ width: "100%", padding: 13, marginTop: 6 }} disabled={busy}>
            {busy ? <span className="spinner" /> : null} {busy ? "Please wait…" : (mode === "login" ? "Sign In" : "Create Account")}
          </button>
        </form>
        <div className="auth-foot">Secured with JWT · {mode === "register" ? "Password must be 8+ characters" : "Educational use only"}</div>
      </div>
    </div>
  );
}

function App() {
  const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY) || "");
  const [user, setUser] = useState(null);
  const [bootChecking, setBootChecking] = useState(true);
  const [view, setView] = useState("dashboard");

  const [cfg, setCfg] = useState({
    tickers: "RELIANCE.NS, HDFCBANK.NS, SBIN.NS, TCS.NS, INFY.NS",
    period: "2y", portfolioValue: 1000000, riskFree: 0.07,
  });

  const [results, setResults] = useState({ m3: null, m4: null, m5: null, m7: null });
  const [portfolio, setPortfolio] = useState(null);
  const [loading, setLoading] = useState({});
  const [errors, setErrors] = useState({});

  // restore previous activity for a user (portfolio + last results + config)
  const hydrate = (username) => {
    const act = loadActivity(username);
    if (!act) return;
    if (act.portfolio) setPortfolio(act.portfolio);
    if (act.results) setResults(r => ({ ...r, ...act.results }));
    if (act.cfg) setCfg(c => ({ ...c, ...act.cfg }));
  };

  // restore session
  useEffect(() => {
    if (!token) { setBootChecking(false); return; }
    apiCall("/api/auth/me", { token })
      .then(d => { setUser(d.user); hydrate(d.user.username); })
      .catch(() => { localStorage.removeItem(TOKEN_KEY); setToken(""); })
      .finally(() => setBootChecking(false));
  }, []);

  const onAuthed = (tok, usr) => { setToken(tok); setUser(usr); hydrate(usr.username); };
  const logout = () => { localStorage.removeItem(TOKEN_KEY); setToken(""); setUser(null); setResults({ m3: null, m4: null, m5: null, m7: null }); setPortfolio(null); };

  const parseTickers = () => cfg.tickers.split(",").map(t => t.trim().toUpperCase()).filter(Boolean);

  // merge a patch into this user's persisted activity (their "previous activity")
  const persist = (patch) => {
    if (!user) return;
    const prev = loadActivity(user.username) || {};
    saveActivity(user.username, { ...prev, ...patch, savedAt: Date.now() });
  };

  const handleCsv = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const holdings = parsePortfolioCsv(String(ev.target.result || ""));
      if (!holdings.length) {
        setErrors(er => ({ ...er, dashboard: "Could not read any holdings. Use rows of TICKER,VALUE — e.g. RELIANCE.NS,150000" }));
        return;
      }
      const pf = buildPortfolio(holdings);
      const tickerStr = holdings.map(h => h.ticker).join(", ");
      const cfgPatch = { tickers: tickerStr, portfolioValue: Math.round(pf.total) };
      setPortfolio(pf);
      setCfg(c => ({ ...c, ...cfgPatch }));
      setErrors(er => ({ ...er, dashboard: "" }));
      persist({ portfolio: pf, cfg: cfgPatch });
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const run = async () => {
    const tickers = parseTickers();
    if (tickers.length < 2) { setErrors(e => ({ ...e, [view]: "Enter at least 2 tickers." })); return; }
    const rf = parseFloat(cfg.riskFree) || 0.07;
    const pv = parseFloat(cfg.portfolioValue) || 1000000;
    const key = view === "about" ? null : view;
    if (!key) return;
    setLoading(l => ({ ...l, [key]: true }));
    setErrors(e => ({ ...e, [key]: "" }));
    try {
      let data;
      if (view === "dashboard") {
        // use the user's actual holding weights so metrics reflect their portfolio
        let cw;
        if (portfolio && portfolio.holdings.length === tickers.length) {
          cw = portfolio.holdings.map(h => h.weight);
        }
        data = await apiCall("/api/m3/optimize", { method: "POST", token, body: { tickers, period: cfg.period, risk_free_rate: rf, current_weights: cw } });
        data.__portfolioValue = pv;
        setResults(r => ({ ...r, m3: data }));
        persist({ results: { ...results, m3: data }, cfg: { tickers: cfg.tickers, period: cfg.period, portfolioValue: pv } });
      } else if (view === "optimizer") {
        data = await apiCall("/api/m5/institutional", { method: "POST", token, body: { tickers, portfolio_value: pv, risk_free_rate: rf } });
        setResults(r => ({ ...r, m5: data }));
        persist({ results: { ...results, m5: data } });
      } else if (view === "stress") {
        data = await apiCall("/api/m4/scenarios", { method: "POST", token, body: { tickers, portfolio_value: pv, risk_free_rate: rf } });
        setResults(r => ({ ...r, m4: data }));
        persist({ results: { ...results, m4: data } });
      } else if (view === "regime") {
        data = await apiCall("/api/m7/regime", { method: "POST", token, body: { tickers, risk_free_rate: rf } });
        setResults(r => ({ ...r, m7: data }));
        persist({ results: { ...results, m7: data } });
      }
    } catch (e) {
      setErrors(er => ({ ...er, [key]: e.message }));
    } finally {
      setLoading(l => ({ ...l, [key]: false }));
    }
  };

  if (bootChecking) {
    return <div className="auth-shell"><span className="spinner lg" /></div>;
  }
  if (!token || !user) {
    return <AuthScreen onAuthed={onAuthed} />;
  }

  const showParams = view !== "about";
  const runLabels = { dashboard: "Run Analysis", optimizer: "Optimize", stress: "Run Stress Test", regime: "Detect Regime" };

  return (
    <div className="shell">
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-logo" />
          <div className="brand-name">ClearView<small>Analytics</small></div>
        </div>
        <div className="nav-label">General</div>
        {NAV.filter(n => n.group === "general").map(n => (
          <div key={n.id} className={"nav-item" + (view === n.id ? " active" : "")} onClick={() => setView(n.id)}>
            <Ico d={ICONS[n.icon]} />{n.label}
          </div>
        ))}
        <div className="nav-label">Other</div>
        {NAV.filter(n => n.group === "other").map(n => (
          <div key={n.id} className={"nav-item" + (view === n.id ? " active" : "")} onClick={() => setView(n.id)}>
            <Ico d={ICONS[n.icon]} />{n.label}
          </div>
        ))}
        <div className="sidebar-spacer" />
        <div className="side-foot">
          <strong style={{ color: "var(--text-dim)" }}>{(PAGE_INFO[view] || {}).title || "ClearView"}</strong><br />
          {(PAGE_INFO[view] || {}).body || ""}
        </div>
        <div className="nav-item" onClick={logout} style={{ marginTop: 4 }}>
          <Ico d={ICONS.logout} />Sign Out
        </div>
      </aside>

      <main className="main">
        <header className="topbar">
          <div className="crumb">
            <div className="crumb-btn">‹</div>
            <div className="crumb-btn">›</div>
          </div>
          <div className="crumb-title">{TITLES[view]}</div>
          <div className="topbar-right">
            <div className="userchip" onClick={() => setView("about")} style={{ cursor: "pointer" }} title="Open account settings">
              <div className="userav">{initials(user.username)}</div>
              {user.username}
            </div>
          </div>
        </header>

        <div className="page">
          {showParams && (
            <ParamBar cfg={cfg} setCfg={setCfg} onRun={run} loading={!!loading[view]} runLabel={runLabels[view]} onUploadCsv={view === "dashboard" ? handleCsv : null} showPeriod={view === "dashboard"} />
          )}
          {view === "dashboard" && <DashboardView user={user} m3={results.m3} portfolio={portfolio} loading={!!loading.dashboard} error={errors.dashboard} />}
          {view === "optimizer" && <OptimizerView m5={results.m5} pv={cfg.portfolioValue} loading={!!loading.optimizer} error={errors.optimizer} />}
          {view === "stress" && <StressView m4={results.m4} loading={!!loading.stress} error={errors.stress} />}
          {view === "regime" && <RegimeView m7={results.m7} loading={!!loading.regime} error={errors.regime} />}
          {view === "about" && <AboutView user={user} onLogout={logout} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</script>
</body>
