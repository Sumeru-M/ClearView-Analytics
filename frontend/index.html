<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClearView Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d14;
  --bg2:#0c1420;
  --bg3:#111c2d;
  --bg4:#162035;
  --bg5:#1c2840;
  --border:#1e2e44;
  --border2:#243550;
  --border3:#2d4060;
  --text:#e8f0fc;
  --text2:#a8b8d0;
  --text3:#647a96;
  --text4:#3a5070;
  --text-inv:#070d14;
  --up:#00d4a0;
  --down:#ff4f6d;
  --warning:#f5b731;
  --info:#3b9eff;
  --accent:#3b9eff;
  --accent2:#7c6fff;
  --accent-glow:rgba(59,158,255,.18);
  --up-bg:rgba(0,212,160,.08);
  --down-bg:rgba(255,79,109,.08);
  --warn-bg:rgba(245,183,49,.08);
  --info-bg:rgba(59,158,255,.08);
  --font-display:'Outfit',sans-serif;
  --font-body:'Outfit',sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-serif:'Instrument Serif',serif;
  --r1:4px;--r2:8px;--r3:12px;--r4:16px;--r5:24px;
  --shadow:0 4px 24px rgba(0,0,10,.5);
  --shadow-sm:0 2px 8px rgba(0,0,10,.4);
  --glow:0 0 0 1px rgba(59,158,255,.25),0 0 20px rgba(59,158,255,.08);
  --t:.15s ease-out;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px}
body{overflow-x:hidden;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;overflow:hidden;position:relative}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--accent) 40%,var(--accent2) 60%,transparent);opacity:.15;pointer-events:none}
.sb-top{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:0}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--bg);flex-shrink:0;box-shadow:0 0 12px rgba(59,158,255,.3)}
.logo-text{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);font-weight:400;letter-spacing:.03em;margin-top:1px}

.nav-body{flex:1;overflow-y:auto;padding:8px 0}
.nav-section-label{padding:12px 16px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text4)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:all var(--t);color:var(--text3);font-size:13px;font-weight:500;position:relative;margin:1px 8px;border-radius:var(--r2)}
.nav-item:hover{background:var(--bg3);color:var(--text2)}
.nav-item.active{background:var(--info-bg);color:var(--text);border:1px solid rgba(59,158,255,.15)}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;opacity:.8}
.nav-status{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}
.nav-status.idle{background:var(--border3)}
.nav-status.loading{background:var(--warning);animation:blink 1s ease infinite}
.nav-status.success{background:var(--up)}
.nav-status.error{background:var(--down)}

.sb-bottom{padding:12px;border-top:1px solid var(--border)}
.backend-status{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--border)}
.bs-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bs-dot.online{background:var(--up);box-shadow:0 0 6px var(--up)}
.bs-dot.offline{background:var(--down)}
.bs-text{font-size:11px;color:var(--text3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{height:52px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(59,158,255,.2),transparent)}
.topbar-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;margin-right:4px}
.topbar-pills{display:flex;gap:4px;flex:1;flex-wrap:wrap;overflow:hidden}
.ticker-pill{padding:2px 8px;border-radius:var(--r1);background:var(--bg4);border:1px solid var(--border2);font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:.02em}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2);cursor:default}
.user-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bg)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.page{padding:24px;max-width:1280px;width:100%;margin:0 auto;animation:pageIn .2s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── OFFLINE BANNER ── */
.offline-banner{background:rgba(255,79,109,.12);border-bottom:1px solid rgba(255,79,109,.2);padding:6px 20px;font-size:12px;color:var(--down);display:flex;align-items:center;gap:8px}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.2}
.page-title span{font-family:var(--font-serif);font-style:italic;color:var(--accent)}
.page-sub{font-size:13px;color:var(--text3);margin-top:4px;line-height:1.5}
.page-divider{width:40px;height:2px;background:linear-gradient(to right,var(--accent),var(--accent2));border-radius:2px;margin-top:12px}

/* ── CARDS ── */
.card{background:linear-gradient(180deg,rgba(255,255,255,.015),transparent 70%),var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:20px;transition:border-color var(--t),box-shadow var(--t)}
.card:hover{border-color:var(--border2);box-shadow:0 10px 34px rgba(0,0,0,.18)}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.card-inset{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.card-accent{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r3);padding:20px}
.card-glow{border-color:rgba(59,158,255,.25);box-shadow:var(--glow)}

/* ── METRIC CARDS ── */
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:16px 18px;transition:all var(--t)}
.metric-card:hover{background:var(--bg3);border-color:var(--border2)}
.mc-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text4);margin-bottom:6px}
.mc-value{font-family:var(--font-mono);font-size:22px;font-weight:500;color:var(--text);line-height:1;letter-spacing:-.01em}
.mc-value.up{color:var(--up)}
.mc-value.down{color:var(--down)}
.mc-value.warn{color:var(--warning)}
.mc-sub{font-size:11px;color:var(--text4);margin-top:6px;line-height:1.4}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1000px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}.sidebar{display:none}.page{padding:14px}}

/* ── INPUTS ── */
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:7px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border var(--t),box-shadow var(--t);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,158,255,.1)}
input::placeholder{color:var(--text4)}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:5px;display:block}
input[type="range"]{padding:0;height:4px;border-radius:99px;cursor:pointer;accent-color:var(--accent)}
input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:34px;padding:7px 14px;border-radius:var(--r2);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--t);outline:none;user-select:none}
.btn-primary{background:var(--accent);color:var(--bg);letter-spacing:.01em}
.btn-primary:hover:not(:disabled){background:#5facff;box-shadow:0 0 16px rgba(59,158,255,.3)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:var(--info-bg)}
.btn-ghost{background:transparent;border:1px solid transparent;color:var(--text3)}
.btn-ghost:hover{color:var(--text);background:var(--bg3)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--r1)}
.btn-full{width:100%}
.btn-danger{background:rgba(255,79,109,.1);border:1px solid rgba(255,79,109,.2);color:var(--down)}
.btn-danger:hover:not(:disabled){background:rgba(255,79,109,.2)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color var(--t),border-color var(--t)}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}

/* ── TOGGLE GROUP ── */
.tg{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:3px}
.tg-btn{padding:5px 12px;border-radius:var(--r1);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all var(--t)}
.tg-btn.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow-sm)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.02em}
.b-green{background:var(--up-bg);color:var(--up);border:1px solid rgba(0,212,160,.15)}
.b-red{background:var(--down-bg);color:var(--down);border:1px solid rgba(255,79,109,.15)}
.b-amber{background:var(--warn-bg);color:var(--warning);border:1px solid rgba(245,183,49,.15)}
.b-blue{background:var(--info-bg);color:var(--info);border:1px solid rgba(59,158,255,.15)}
.b-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.b-purple{background:rgba(124,111,255,.1);color:var(--accent2);border:1px solid rgba(124,111,255,.2)}
.regime-badge{padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.rb-bull{background:var(--up-bg);color:var(--up);border:1px solid rgba(0,212,160,.2)}
.rb-bear{background:var(--warn-bg);color:var(--warning);border:1px solid rgba(245,183,49,.2)}
.rb-crisis{background:var(--down-bg);color:var(--down);border:1px solid rgba(255,79,109,.2)}
.rb-trans{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text4);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tr-best td{color:var(--text)!important;background:rgba(59,158,255,.04)!important}
.tr-best td:first-child{border-left:2px solid var(--accent)}
.td-r{text-align:right}
.td-mono{font-family:var(--font-mono)}
.td-center{text-align:center}

/* ── PROGRESS BARS ── */
.pbar{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.pbar-h{height:6px}

/* ── SIGNAL ROWS ── */
.sig-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.sig-label{font-family:var(--font-mono);font-size:11px;color:var(--text3);width:110px;flex-shrink:0;letter-spacing:.01em}
.sig-bar{flex:1;height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.sig-fill{height:100%;border-radius:99px}
.sig-val{font-family:var(--font-mono);font-size:11px;color:var(--text);width:40px;text-align:right;flex-shrink:0}

/* ── FORM ── */
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-field{flex:1;min-width:130px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.input-group{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}

/* ── TICKER INPUT ── */
.ticker-wrap{display:flex;flex-wrap:wrap;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:6px 10px;min-height:38px;align-items:center;cursor:text;transition:border var(--t)}
.ticker-wrap:focus-within{border-color:var(--accent)}
.ticker-tag{display:flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r1);padding:2px 6px;font-family:var(--font-mono);font-size:11px;color:var(--text2)}
.ticker-tag button{background:none;border:none;color:var(--text4);cursor:pointer;font-size:13px;line-height:1;padding:0 2px;transition:color var(--t)}
.ticker-tag button:hover{color:var(--down)}
.ticker-inline{background:none;border:none;outline:none;font-family:var(--font-mono);font-size:12px;color:var(--text);width:90px;padding:0;min-width:70px}
.ticker-count{margin-left:auto;font-size:10px;color:var(--text4)}

/* ── CSV IMPORT ── */
.import-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px}
.import-hint{font-size:11px;color:var(--text4);margin-top:6px;line-height:1.5}
.import-ok{font-size:12px;color:var(--up);margin-top:6px}
.import-err{font-size:12px;color:var(--down);margin-top:6px}

/* ── AUTH ── */
.auth-shell{min-height:100vh;display:grid;place-items:center;padding:20px;background:var(--bg);position:relative;overflow:hidden}
.auth-shell::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,158,255,.04) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.auth-wrap{width:min(880px,100%);display:grid;grid-template-columns:1.15fr 0.85fr;gap:16px}
@media(max-width:800px){.auth-wrap{grid-template-columns:1fr}}
.auth-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r5);padding:28px}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.auth-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--bg);box-shadow:0 0 20px rgba(59,158,255,.3)}
.auth-logo-text{font-size:16px;font-weight:700;color:var(--text);line-height:1}
.auth-logo-sub{font-size:10px;color:var(--text3);letter-spacing:.04em}
.auth-title{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.2;color:var(--text);margin-bottom:10px}
.auth-title em{font-family:var(--font-serif);font-style:italic;color:var(--accent)}
.auth-sub{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:16px}
.auth-disclaimer{border-left:3px solid var(--warning);background:var(--warn-bg);border-radius:var(--r2);padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:16px}
.auth-features{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.auth-feature{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text3)}
.auth-feature-icon{width:20px;height:20px;border-radius:var(--r1);background:var(--info-bg);border:1px solid rgba(59,158,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.auth-form{display:flex;flex-direction:column;gap:12px}
.auth-error{font-size:12px;color:var(--down);padding:8px 10px;background:var(--down-bg);border-radius:var(--r1)}
.auth-note{font-size:12px;color:var(--text4);line-height:1.5}
.consent-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}

/* ── SPINNER ── */
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--text3);font-size:13px}
.loading-dots{font-family:var(--font-mono);font-size:11px;color:var(--text4);margin-top:4px;animation:dotsAnim 1.2s infinite}
@keyframes dotsAnim{0%{content:'...'}33%{content:'.. '}66%{content:'. .'}}

/* ── ERROR ── */
.error-box{background:var(--down-bg);border:1px solid rgba(255,79,109,.2);border-radius:var(--r3);padding:14px 16px;display:flex;align-items:flex-start;gap:10px}
.error-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.error-text{font-size:13px;color:var(--text2);line-height:1.5}

/* ── MODULE CARDS (DASHBOARD) ── */
.mod-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:18px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-stripe,var(--accent));opacity:.6;transition:opacity var(--t)}
.mod-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.mod-card:hover::before{opacity:1}
.mod-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.mod-card-status{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:12px}
.mod-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.mm-label{font-size:10px;color:var(--text4);margin-bottom:2px;font-weight:500}
.mm-value{font-family:var(--font-mono);font-size:12px;color:var(--text);font-weight:500}
.mod-arrow{position:absolute;top:16px;right:16px;font-size:16px;opacity:.3;transition:opacity var(--t)}
.mod-card:hover .mod-arrow{opacity:.7}

/* ── INSIGHT CARDS ── */
.insight-strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.insight-strip::-webkit-scrollbar{display:none}
.insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;min-width:240px;flex-shrink:0;border-left:3px solid var(--insight-color,var(--accent))}
.insight-text{font-size:12px;color:var(--text2);line-height:1.6}

/* ── ATTACK CARDS ── */
.attack-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;transition:border var(--t)}
.attack-card.tested{border-color:rgba(59,158,255,.3)}
.attack-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.attack-desc{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:8px}
.attack-protect{font-size:11px;color:var(--text4);line-height:1.5;padding:6px 8px;background:var(--bg4);border-radius:var(--r1);border-left:2px solid var(--up)}

/* ── HORIZON CARD ── */
.horizon-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.hc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text4);margin-bottom:10px}
.hc-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border);margin-bottom:3px}

/* ── DONUT ── */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.donut-legend{width:100%;display:flex;flex-direction:column;gap:4px}
.dl-item{display:flex;align-items:center;gap:8px;font-size:12px}
.dl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── TRANSITION MATRIX ── */
.tm-cell{font-family:var(--font-mono);font-size:11px;text-align:center;padding:7px 6px}
.tm-head{font-size:10px;color:var(--text4);text-align:center;padding:6px;white-space:nowrap}

/* ── CORR CELL ── */
.corr-cell{font-family:var(--font-mono);font-size:11px;text-align:center;padding:6px 4px}

/* ── SECTION HEADER PILL ── */
.sec-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text4);margin-bottom:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
@keyframes shimmer{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}
.pulse{animation:shimmer 2s ease infinite}

/* ── STACK ── */
.stack{display:flex;flex-direction:column;gap:12px}
.stack-sm{display:flex;flex-direction:column;gap:6px}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ── GLOSSARY ── */
.glossary{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:18px}
.glossary h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.glossary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
.gl-term{font-size:13px;color:var(--text2);line-height:1.5}
.gl-term strong{color:var(--accent);display:block;font-weight:600;margin-bottom:2px}

/* ── RESPONSIVE ── */
@media(max-width:600px){.g2{grid-template-columns:1fr}.auth-wrap{grid-template-columns:1fr}.topbar{height:auto;min-height:52px;align-items:flex-start;padding:10px 12px;flex-wrap:wrap}.topbar-pills{order:3;flex-basis:100%}.topbar-right{width:100%;justify-content:space-between}.user-chip{min-width:0;max-width:65%;overflow:hidden}.page-title{font-size:20px}.card{padding:16px}.glossary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const MAX_ENTRIES = 15;
const AUTH_TOKEN = "cv-auth-token";
const AUTH_PROFILE = "cv-auth-profile";

// ── API BASE ───────────────────────────────────────────────────────────────────
const BASE = window.__VITE_API_BASE_URL ||
  localStorage.getItem("cv-api-base") ||
  (window.location.protocol.startsWith("http") ? window.location.origin : "http://localhost:8000");

function authHeader(skip) {
  if (skip) return {};
  const t = localStorage.getItem(AUTH_TOKEN);
  return t ? { Authorization: `Bearer ${t}` } : {};
}

async function apiPost(path, body, opts = {}) {
  const res = await fetch(`${BASE}${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...authHeader(opts.skipAuth) },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    localStorage.removeItem(AUTH_TOKEN); localStorage.removeItem(AUTH_PROFILE);
    window.dispatchEvent(new Event("cv-auth-expired"));
  }
  if (!res.ok || data.error || data.detail) throw new Error(data.error || data.detail || `HTTP ${res.status}`);
  return data;
}

async function apiGet(path, opts = {}) {
  const res = await fetch(`${BASE}${path}`, { headers: authHeader(opts.skipAuth) });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    localStorage.removeItem(AUTH_TOKEN); localStorage.removeItem(AUTH_PROFILE);
    window.dispatchEvent(new Event("cv-auth-expired"));
  }
  if (!res.ok || data.error || data.detail) throw new Error(data.error || data.detail || `HTTP ${res.status}`);
  return data;
}

// ── DEFAULTS ───────────────────────────────────────────────────────────────────
const DEFAULT_ENTRIES = [
  { ticker: "RELIANCE.NS", shares: 10, price: 2850, weight: 0.34 },
  { ticker: "TCS.NS", shares: 5, price: 3900, weight: 0.33 },
  { ticker: "INFY.NS", shares: 12, price: 1650, weight: 0.33 },
];

const CO_MAP = {
  BHARATELECTRONICSLTD:"BEL.NS",BIOCONLIMITED:"BIOCON.NS",COFORGELIMITED:"COFORGE.NS",
  DRREDDYSLABORATORIES:"DRREDDY.NS",HCLTECHNOLOGIESLTD:"HCLTECH.NS",HDFCBANKLTD:"HDFCBANK.NS",
  JBMAUTOLIMITED:"JBMA.NS",JINDALSTAINLESSLIMITED:"JSL.NS",KFINTECHNOLOGIESLIMITED:"KFINTECH.NS",
  MOTILALOSNASDAQ100ETF:"MON100.NS",NIPINDETFNIFTYBEES:"NIFTYBEES.NS",SAKSOFTLIMITED:"SAKSOFT.NS",
  STATEBANKOFINDIA:"SBIN.NS",TATAMOTORSLIMITED:"TATAMOTORS.NS",
};

function normTicker(raw) {
  const t = (raw||"").trim().toUpperCase().replace(/\.$/,"");
  if (!t) return "";
  if (t.startsWith("^")) return t;
  if (/^[A-Z0-9_-]+(?:\.[A-Z]{1,4})?$/.test(t)) return t.includes(".") ? t : `${t}.NS`;
  const base = t.endsWith(".NS") ? t.slice(0,-3) : t;
  const compact = base.replace(/[^A-Z0-9]+/g,"");
  if (CO_MAP[compact]) return CO_MAP[compact];
  if (!compact) return "";
  return `${compact}.NS`;
}

function alignEntries(tickers, existing) {
  const map = {};
  (existing||[]).forEach(e => { const t = normTicker(e?.ticker); if (t && !map[t]) map[t] = e; });
  return (tickers||[]).slice(0,MAX_ENTRIES).map(t => {
    const n = normTicker(t);
    return map[n] || { ticker: n, shares: null, price: null, weight: null };
  });
}

function weightsFromEntries(entries, tickers) {
  const input = entries || [], list = tickers || [];
  let totalVal = 0; const vm = {};
  input.forEach(e => {
    if (e?.ticker && isFinite(e.shares) && isFinite(e.price) && e.shares > 0 && e.price > 0) {
      vm[e.ticker] = e.shares * e.price; totalVal += vm[e.ticker];
    }
  });
  if (totalVal > 0) {
    const s = list.map(t => (vm[t]||0)/totalVal);
    const tot = s.reduce((a,b)=>a+b,0);
    return tot > 0 ? s.map(v=>(v/tot)*100) : list.map(()=>100/Math.max(list.length,1));
  }
  const wm = {};
  input.forEach(e => { if (e?.ticker && isFinite(e.weight)) wm[e.ticker] = e.weight > 1 ? e.weight/100 : e.weight; });
  const s = list.map(t=>wm[t]||0);
  const tot = s.reduce((a,b)=>a+b,0);
  return tot > 0 ? s.map(v=>(v/tot)*100) : list.map(()=>100/Math.max(list.length,1));
}

function holdingsFromEntries(entries) {
  return (entries||[]).filter(e=>e?.ticker).slice(0,MAX_ENTRIES).map(e=>({
    ticker:e.ticker, shares:isFinite(e.shares)?Math.max(0,e.shares):0, price:isFinite(e.price)?Math.max(0,e.price):0,
  }));
}

// ── PARSE CSV ──────────────────────────────────────────────────────────────────
function parseCsvRow(line) {
  const out=[]; let cur="",inQ=false;
  for (let i=0;i<line.length;i++) {
    const ch=line[i];
    if (ch==='"') { if (inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
    else if (ch===','&&!inQ) { out.push(cur.trim());cur=""; }
    else cur+=ch;
  }
  out.push(cur.trim()); return out;
}
function parseNum(raw) {
  if (raw==null||String(raw).trim()==="") return null;
  const n=Number(String(raw).replace(/[^\d.-]/g,"").trim());
  return isFinite(n)?n:null;
}
function parsePortfolioCsv(text) {
  const lines=(text||"").split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if (!lines.length) throw new Error("CSV file is empty.");
  const first=parseCsvRow(lines[0]).map(h=>h.trim().toLowerCase());
  const TH=["ticker","symbol","stock","asset","company","company_name","security","name","instrument"];
  const SH=["shares","qty","quantity","units"],PH=["price","avg_price","average_price","cost"],WH=["weight","allocation","weight_pct","allocation_pct"];
  const hasH=first.some(h=>[...TH,...SH,...PH,...WH].includes(h));
  const header=hasH?first:["ticker","shares","price","weight"];
  const idx=als=>header.findIndex(h=>als.includes(h));
  const ti=idx(TH),si=idx(SH),pi=idx(PH),wi=idx(WH);
  const body=hasH?lines.slice(1):lines;
  if (!body.length) throw new Error("CSV has no data rows.");
  if (body.length>MAX_ENTRIES) throw new Error(`Max ${MAX_ENTRIES} entries.`);
  const entries=[];
  body.forEach(line=>{
    const row=parseCsvRow(line);
    const t=normTicker(row[ti>=0?ti:0]);
    if (!t) return;
    entries.push({ticker:t,shares:parseNum(si>=0?row[si]:null),price:parseNum(pi>=0?row[pi]:null),weight:parseNum(wi>=0?row[wi]:null)});
  });
  if (!entries.length) throw new Error("No valid portfolio rows.");
  const seen=new Set(),deduped=[];
  entries.forEach(e=>{if(!seen.has(e.ticker)&&deduped.length<MAX_ENTRIES){seen.add(e.ticker);deduped.push(e);}});
  return { entries:deduped, tickers:deduped.map(e=>e.ticker) };
}

// ── GLOBAL STORE ───────────────────────────────────────────────────────────────
const useStore = (() => {
  let listeners = [];
  let state = {
    tickers: ["RELIANCE.NS","TCS.NS","INFY.NS"],
    portfolioEntries: DEFAULT_ENTRIES,
    riskFreeRate: 0.07,
    portfolioValue: 1000000,
    backendOnline: true,
    m3:{result:null,status:"idle"}, m4:{result:null,status:"idle"},
    m5:{result:null,status:"idle"}, m6:{result:null,status:"idle"},
    m7:{result:null,status:"idle"},
  };
  function setState(patch) { state={...state,...patch}; listeners.forEach(fn=>fn(state)); }
  function setModule(key,result) { setState({[key]:{result,status:"success"}}); }
  function setStatus(key,status) { setState({[key]:{...state[key],status}}); }
  return function() {
    const [s,setS]=useState(state);
    useEffect(()=>{ listeners.push(setS); return()=>{ listeners=listeners.filter(f=>f!==setS); }; },[]);
    return [s,setState,setModule,setStatus];
  };
})();

// ── FORMATTERS ─────────────────────────────────────────────────────────────────
const fmt = n=>isNaN(n)?"—":n.toLocaleString("en-IN");
const fmtPct = (n,d=2)=>isNaN(n)?"—":(n*100).toFixed(d)+"%";
const fmtM = (n,d=3)=>isNaN(n)?"—":Number(n).toFixed(d);
const fmtINR = n=>isNaN(n)?"—":"₹"+Math.abs(n).toLocaleString("en-IN",{maximumFractionDigits:0});
const sign = n=>n>0?"+":n<0?"-":"";
const regCol = r=>r==="Low-Vol Bull"?"var(--up)":r==="High-Vol Bear"?"var(--warning)":r==="Crisis"?"var(--down)":"var(--text3)";
const regBadge = r=>r==="Low-Vol Bull"?"rb-bull":r==="High-Vol Bear"?"rb-bear":r==="Crisis"?"rb-crisis":"rb-trans";
const regIcon = r=>r==="Low-Vol Bull"?"↗":r==="High-Vol Bear"?"↘":r==="Crisis"?"⚠":"↔";
const COLORS = ["var(--accent)","var(--up)","var(--info)","var(--warning)","var(--down)","var(--accent2)","#ff9d4f","#c4f5ca"];

function threatBadge(level) {
  if (!level) return <span className="badge b-gray">—</span>;
  const l=level.toUpperCase();
  if (l==="HIGH"||l==="CRITICAL_THREAT") return <span className="badge b-red">● {level}</span>;
  if (l==="MEDIUM"||l==="ELEVATED_RISK"||l==="MONITOR") return <span className="badge b-amber">● {level}</span>;
  return <span className="badge b-green">● {l==="SAFE"?"SAFE":level}</span>;
}

// ── SHARED COMPONENTS ──────────────────────────────────────────────────────────
function Spinner({msg=""}) {
  return (
    <div className="loading-wrap">
      <div className="spinner"/>
      <p>{msg||"Loading…"}</p>
    </div>
  );
}

function ErrorBox({msg,onRetry}) {
  return (
    <div className="error-box">
      <span className="error-icon">⚠</span>
      <div>
        <p className="error-text">{msg}</p>
        {onRetry && <button className="btn btn-sm btn-outline" style={{marginTop:8}} onClick={onRetry}>Retry</button>}
      </div>
    </div>
  );
}

function MetricCard({label,value,sub,color}) {
  const cls = color==="up"?"up":color==="down"?"down":color==="warn"?"warn":"";
  return (
    <div className="metric-card">
      <div className="mc-label">{label}</div>
      <div className={`mc-value ${cls}`}>{value}</div>
      {sub && <div className="mc-sub">{sub}</div>}
    </div>
  );
}

function Tabs({tabs,active,onChange}) {
  return (
    <div className="tabs">
      {tabs.map(t=>(
        <button key={t.id} className={`tab${active===t.id?" active":""}`} onClick={()=>onChange(t.id)}>{t.label}</button>
      ))}
    </div>
  );
}

function SectionLabel({children}) {
  return <div className="sec-label">{children}</div>;
}

function ToggleGroup({options,value,onChange}) {
  return (
    <div className="tg">
      {options.map(o=>(
        <button key={o.value||o} className={`tg-btn${(o.value||o)===value?" active":""}`} onClick={()=>onChange(o.value||o)}>
          {o.label||o}
        </button>
      ))}
    </div>
  );
}

function TickerInput({tickers,onChange}) {
  tickers = Array.isArray(tickers) ? tickers : [];
  const [val,setVal]=useState(""); const ref=useRef();
  function add() {
    const n=normTicker(val); if (!n) return;
    if (tickers.length>=MAX_ENTRIES||tickers.includes(n)) { setVal(""); return; }
    onChange([...tickers,n]); setVal("");
  }
  function remove(t) { onChange(tickers.filter(x=>x!==t)); }
  function onKey(e) {
    if (e.key==="Enter"||e.key===",") { e.preventDefault(); add(); }
    if (e.key==="Backspace"&&!val&&tickers.length>0) onChange(tickers.slice(0,-1));
  }
  return (
    <div className="ticker-wrap" onClick={()=>ref.current?.focus()}>
      {tickers.map(t=>(
        <span key={t} className="ticker-tag">{t}<button onClick={()=>remove(t)}>×</button></span>
      ))}
      {tickers.length<MAX_ENTRIES && (
        <input ref={ref} className="ticker-inline" placeholder={tickers.length===0?"Add tickers…":"Add more…"}
          value={val} onChange={e=>setVal(e.target.value)} onKeyDown={onKey} onBlur={add}/>
      )}
      <span className="ticker-count">{tickers.length}/{MAX_ENTRIES}</span>
    </div>
  );
}

function CsvImport({onImport}) {
  const [status,setStatus]=useState(""); const [ok,setOk]=useState(true);
  async function handle(e) {
    const file=e.target.files?.[0]; if (!file) return;
    if (!file.name.toLowerCase().endsWith(".csv")) { setOk(false); setStatus("Please upload a .csv file."); e.target.value=""; return; }
    try {
      const text=await file.text(); const parsed=parsePortfolioCsv(text);
      onImport(parsed); setOk(true); setStatus(`Imported ${parsed.entries.length} holdings from ${file.name}`);
    } catch(err) { setOk(false); setStatus(err?.message||"Import failed."); }
    e.target.value="";
  }
  return (
    <div className="import-box">
      <label>Portfolio CSV Import</label>
      <input type="file" accept=".csv,text/csv" onChange={handle} style={{marginTop:4}}/>
      <p className="import-hint">Header row with <code>ticker</code>/<code>symbol</code>, optional: <code>shares</code>, <code>price</code>, <code>weight</code>. Max {MAX_ENTRIES} rows.</p>
      {status && <p className={ok?"import-ok":"import-err"}>{status}</p>}
    </div>
  );
}

function WeightDonut({weights,title}) {
  const entries=Object.entries(weights||{}).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  const r=54,cx=70,cy=70,sw=16,circ=2*Math.PI*r;
  let off=0;
  const slices=entries.map(([k,v],i)=>{
    const pct=total>0?v/total:0; const dash=pct*circ; const gap=circ-dash;
    const sl=<circle key={k} cx={cx} cy={cy} r={r} fill="none" stroke={COLORS[i%COLORS.length]}
      strokeWidth={sw} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off}
      style={{transition:"stroke-dasharray .4s"}}/>;
    off+=dash; return sl;
  });
  return (
    <div className="donut-wrap">
      {title&&<p style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text3)"}}>{title}</p>}
      <svg width="140" height="140" style={{transform:"rotate(-90deg)"}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg4)" strokeWidth={sw}/>
        {slices}
      </svg>
      <div className="donut-legend">
        {entries.slice(0,8).map(([k,v],i)=>(
          <div key={k} className="dl-item">
            <div className="dl-dot" style={{background:COLORS[i%COLORS.length]}}/>
            <span style={{flex:1,color:"var(--text2)",fontFamily:"var(--font-mono)",fontSize:11}}>{k.replace(".NS","")}</span>
            <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text)"}}>{fmtPct(v)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FrontierChart({frontier,specialPoints}) {
  if (!frontier||!frontier.length) return <p style={{color:"var(--text3)",fontSize:13}}>No frontier data.</p>;
  const allX=[...frontier.map(p=>p.volatility*100),...(specialPoints||[]).map(p=>p.x)];
  const allY=[...frontier.map(p=>p.return*100),...(specialPoints||[]).map(p=>p.y)];
  const xMin=Math.min(...allX)*.92,xMax=Math.max(...allX)*1.08;
  const yMin=Math.min(...allY)*.9,yMax=Math.max(...allY)*1.1;
  const W=520,H=280,P={t:20,r:20,b:40,l:52};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const px=v=>P.l+((v-xMin)/(xMax-xMin))*cW;
  const py=v=>P.t+(1-(v-yMin)/(yMax-yMin))*cH;
  const path=frontier.map((p,i)=>`${i===0?"M":"L"}${px(p.volatility*100).toFixed(1)},${py(p.return*100).toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",maxHeight:300}}>
      {/* Grid */}
      {[0.25,0.5,0.75].map(t=>(
        <line key={t} x1={P.l} x2={W-P.r} y1={P.t+t*cH} y2={P.t+t*cH} stroke="var(--border)" strokeDasharray="3 4" strokeWidth={.5}/>
      ))}
      {/* Axes */}
      <line x1={P.l} x2={P.l} y1={P.t} y2={H-P.b} stroke="var(--border2)" strokeWidth={1}/>
      <line x1={P.l} x2={W-P.r} y1={H-P.b} y2={H-P.b} stroke="var(--border2)" strokeWidth={1}/>
      {/* Labels */}
      <text x={P.l-4} y={P.t+cH*.1} textAnchor="end" fontSize={9} fill="var(--text4)">{(yMin+(yMax-yMin)*.9).toFixed(1)}%</text>
      <text x={P.l-4} y={P.t+cH*.9} textAnchor="end" fontSize={9} fill="var(--text4)">{(yMin+(yMax-yMin)*.1).toFixed(1)}%</text>
      <text x={P.l} y={H-6} textAnchor="start" fontSize={9} fill="var(--text4)">{xMin.toFixed(1)}%</text>
      <text x={W-P.r} y={H-6} textAnchor="end" fontSize={9} fill="var(--text4)">{xMax.toFixed(1)}%</text>
      <text x={W/2} y={H-2} textAnchor="middle" fontSize={9} fill="var(--text4)">Risk (Volatility %)</text>
      <text x={10} y={H/2} textAnchor="middle" fontSize={9} fill="var(--text4)" transform={`rotate(-90,10,${H/2})`}>Return %</text>
      {/* Area fill */}
      <path d={path+" L"+px(frontier[frontier.length-1].volatility*100)+","+(H-P.b)+" L"+px(frontier[0].volatility*100)+","+(H-P.b)+" Z"}
        fill="url(#fgr)" opacity={.15}/>
      <defs><linearGradient id="fgr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)"/><stop offset="100%" stopColor="var(--accent)" stopOpacity={0}/></linearGradient></defs>
      {/* Curve */}
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth={2} strokeLinecap="round"/>
      {/* Points */}
      {(specialPoints||[]).map((sp,i)=>(
        <g key={i}>
          <circle cx={px(sp.x)} cy={py(sp.y)} r={5} fill={sp.fill} stroke="var(--bg)" strokeWidth={2}/>
          <text x={px(sp.x)+8} y={py(sp.y)+4} fontSize={9} fill={sp.fill} fontWeight={600}>{sp.label}</text>
        </g>
      ))}
    </svg>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function LoginGate({onAuthenticated,authError}) {
  const [mode,setMode]=useState("signin");
  const [username,setUsername]=useState("");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [consent,setConsent]=useState(false);
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  async function submit(e) {
    e.preventDefault();
    const u=username.trim().toLowerCase(),p=password,em=email.trim().toLowerCase();
    if (!consent) { setError("Please accept the disclaimer to continue."); return; }
    if (!u||!p) { setError("Username and password are required."); return; }
    if (mode==="signup"&&!em) { setError("Email is required for sign-up."); return; }
    setLoading(true); setError("");
    try {
      if (mode==="signup") await apiPost("/api/auth/register",{username:u,email:em,password:p},{skipAuth:true});
      const data=await apiPost("/api/auth/login",{username:u,password:p},{skipAuth:true});
      onAuthenticated(data);
    } catch(err) { setError(err?.message||"Authentication failed."); }
    setLoading(false);
  }

  return (
    <div className="auth-shell">
      <div className="auth-wrap">
        {/* Left panel */}
        <section className="auth-panel">
          <div className="auth-brand">
            <div className="auth-logo-icon">CV</div>
            <div>
              <div className="auth-logo-text">ClearView Analytics</div>
              <div className="auth-logo-sub">PORTFOLIO INTELLIGENCE</div>
            </div>
          </div>
          <h1 className="auth-title">Institutional-grade<br/><em>portfolio analytics</em></h1>
          <p className="auth-sub">Built for Indian equity markets. Stress-test your holdings, optimise allocations, and decode regime shifts — all in one place.</p>
          <div className="auth-disclaimer">
            <strong>⚠ Important Disclaimer</strong><br/>
            ClearView Analytics provides analytics only and does not constitute financial advice. All investment decisions are solely your responsibility.
          </div>
          <div className="auth-features">
            {[
              ["◎","Performance & Risk — Efficient frontier, VaR, factor decomposition"],
              ["⚡","Stress Testing — 13 crisis scenarios including geopolitical and rate shocks"],
              ["⬡","Allocation Strategy — 6 institutional optimisation methods"],
              ["🔐","Trade & Security — PQC ML-DSA-III signed transactions with Bayesian defence"],
              ["◉","Regime Outlook — HMM + GARCH market state detection"],
            ].map(([icon,text])=>(
              <div key={icon} className="auth-feature">
                <div className="auth-feature-icon">{icon}</div>
                <span>{text}</span>
              </div>
            ))}
          </div>
        </section>
        {/* Right panel */}
        <section className="auth-panel">
          <div className="tg" style={{marginBottom:16}}>
            <button className={`tg-btn${mode==="signin"?" active":""}`} onClick={()=>{setMode("signin");setError("");}}>Sign In</button>
            <button className={`tg-btn${mode==="signup"?" active":""}`} onClick={()=>{setMode("signup");setError("");}}>Sign Up</button>
          </div>
          <form className="auth-form" onSubmit={submit}>
            <div><label>Username or Email</label><input value={username} onChange={e=>setUsername(e.target.value)} placeholder="your_username or name@domain.com" autoComplete="username"/></div>
            {mode==="signup"&&<div><label>Email</label><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@domain.com" autoComplete="email"/></div>}
            <div><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="At least 8 characters" autoComplete={mode==="signup"?"new-password":"current-password"}/></div>
            <label className="consent-row">
              <input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} style={{width:14}}/>
              I understand this is analytics only, not financial advice.
            </label>
            {(error||authError)&&<p className="auth-error">{error||authError}</p>}
            <button className="btn btn-primary btn-full" type="submit" disabled={loading}>
              {loading?"Please wait…":mode==="signup"?"Create Account":"Sign In"}
            </button>
            <p className="auth-note">{mode==="signup"?"Create once, sign in from any device.":"Use your username or email to access the platform."}</p>
          </form>
        </section>
      </div>
    </div>
  );
}

function Dashboard({setPage}) {
  const [store,setState,setModule,setStatus]=useStore();
  const [tickers,setTickers]=useState(store.tickers);
  const [rf,setRf]=useState(()=>+(store.riskFreeRate*100).toFixed(4));
  const [pv,setPv]=useState(store.portfolioValue);

  useEffect(()=>{
    let iv;
    async function check(){
      try { await apiGet("/api/health"); setState({backendOnline:true}); }
      catch { setState({backendOnline:false}); }
    }
    check(); iv=setInterval(check,30000);
    return()=>clearInterval(iv);
  },[]);

  function update() {
    setState({ tickers, portfolioEntries:alignEntries(tickers,store.portfolioEntries), riskFreeRate:rf/100, portfolioValue:pv });
  }
  function importCsv(parsed) {
    const val=parsed.entries.reduce((s,e)=>s+(isFinite(e.shares)?e.shares:0)*(isFinite(e.price)?e.price:0),0);
    setTickers(parsed.tickers); if(val>0) setPv(Math.round(val));
    setState({ tickers:parsed.tickers, portfolioEntries:parsed.entries, portfolioValue:val>0?Math.round(val):store.portfolioValue });
  }

  const MODS = [
    { key:"m3", label:"Performance & Risk", icon:"◎", page:"portfolio", color:"var(--accent)",
      getM:r=>r?[{l:"Exp. Return",v:fmtPct(r.max_sharpe_portfolio?.expected_return)},{l:"Sharpe",v:fmtM(r.max_sharpe_portfolio?.sharpe_ratio)},{l:"Volatility",v:fmtPct(r.max_sharpe_portfolio?.volatility)}]:[] },
    { key:"m4", label:"Stress Scenarios", icon:"⚡", page:"stress", color:"var(--warning)",
      getM:r=>r?[{l:"Risk Level",v:r.summary?.risk_level||"—"},{l:"Worst Loss",v:fmtINR(r.summary?.worst_loss?.pnl_inr)},{l:"VaR 95%",v:fmtINR(r.risk_metrics?.var_parametric_inr)}]:[] },
    { key:"m5", label:"Allocation Strategy", icon:"⬡", page:"optimisation", color:"var(--up)",
      getM:r=>r?[{l:"Best Method",v:(r.best_method||"—").replace(/_/g," ")},{l:"Sharpe",v:fmtM(r.recommendation?.sharpe_ratio)},{l:"Health",v:r.recommendation?.health_score||"—"}]:[] },
    { key:"m6", label:"Trade & Security", icon:"🔐", page:"trade", color:"var(--info)",
      getM:r=>r?[{l:"PQC Threat",v:r.security_pqc?.threat_level||"—"},{l:"Bayesian P",v:r.security_bayesian?.posterior_probability!=null?fmtPct(r.security_bayesian.posterior_probability):"—"},{l:"Status",v:r.transaction?.verified?"Verified ✓":"Unverified"}]:[] },
    { key:"m7", label:"Regime Outlook", icon:"◉", page:"regime", color:"var(--accent2)",
      getM:r=>r?[{l:"Regime",v:r.current_regime||"—"},{l:"Current Vol",v:fmtPct(r.garch_current_vol)},{l:"30-Day",v:fmtPct(r.garch_30d_forecast)}]:[] },
  ];

  const insights=[];
  if (store.m7.result) { const r=store.m7.result; const p=r.regime_probabilities?.[r.current_regime]||0; insights.push({text:`Regime: "${r.current_regime}" with ${(p*100).toFixed(0)}% confidence.`,color:"var(--accent2)"}); }
  if (store.m5.result) { const r=store.m5.result; insights.push({text:`Best strategy: ${(r.best_method||"").replace(/_/g," ")}.`,color:"var(--up)"}); }
  if (store.m3.result) { const r=store.m3.result; insights.push({text:`Max-Sharpe: ${fmtPct(r.max_sharpe_portfolio?.expected_return)} return at ${fmtPct(r.max_sharpe_portfolio?.volatility)} vol.`,color:"var(--accent)"}); }

  const totalVal = store.portfolioEntries.reduce((s,e)=>s+(isFinite(e.shares)?e.shares:0)*(isFinite(e.price)?e.price:0),0);

  return (
    <div className="page fade-in">
      <div className="page-header">
        <h1 className="page-title">Executive <span>Dashboard</span></h1>

        <div className="form-grid" style={{marginBottom:12}}>
          <div style={{gridColumn:"1 / -1"}}>
            <label>Active Tickers</label>

            <input type="number" value={rf} onChange={e=>setRf(+e.target.value)} step="0.5" min="0" max="20"/>
          </div>
          <div>
            <label>Portfolio Value (₹)</label>
            <input type="number" value={pv} onChange={e=>setPv(+e.target.value)} step="100000"/>

        </div>
        {totalVal>0&&<p style={{fontSize:12,color:"var(--text3)",marginBottom:10,fontFamily:"var(--font-mono)"}}>Imported Value: {fmtINR(totalVal)}</p>}
        <button className="btn btn-primary btn-sm" onClick={update}>Update Context</button>

      {/* Module grid */}

        {MODS.map(mod=>{
          const ms=store[mod.key]; const metrics=mod.getM(ms.result);
          return (
            <div key={mod.key} className="mod-card" style={{"--accent-stripe":mod.color}} onClick={()=>setPage(mod.page)}>
              <div className="mod-arrow">→</div>

                <span className="mod-card-name">{mod.label}</span>
              </div>
              <div className="mod-card-status">
                <div className="nav-status" style={{background:ms.status==="success"?"var(--up)":ms.status==="error"?"var(--down)":ms.status==="loading"?"var(--warning)":"var(--border3)"}}/>
                <span style={{fontSize:11,color:ms.status==="success"?"var(--up)":ms.status==="error"?"var(--down)":ms.status==="loading"?"var(--warning)":"var(--text4)"}}>
                  {ms.status==="idle"?"Not run yet":ms.status==="loading"?"Running…":ms.status==="success"?"Ready":"Error"}
                </span>
              </div>
              {metrics.length>0?(
                <div className="mod-metrics">
                  {metrics.map(m=>(
                    <div key={m.l}>
                      <div className="mm-label">{m.l}</div>
                      <div className="mm-value">{m.v}</div>
                    </div>
                  ))}
                </div>
              ):(
                <p style={{fontSize:11,color:"var(--text4)",fontStyle:"italic",marginTop:8}}>Run module to see results</p>
              )}
            </div>
          );
        })}
      </div>

      {/* Insights */}
      {insights.length>0&&(
        <div>
          <SectionLabel>Live Insights</SectionLabel>
          <div className="insight-strip">
            {insights.map((ins,i)=>(
              <div key={i} className="insight-card" style={{"--insight-color":ins.color}}>
                <p className="insight-text">{ins.text}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Portfolio() {

  const [tickers,setTickers]=useState(store.tickers);
  const [period,setPeriod]=useState("2y");
  const [rf,setRf]=useState(()=>+(store.riskFreeRate*100).toFixed(4));
  const [weights,setWeights]=useState(()=>weightsFromEntries(store.portfolioEntries,store.tickers));
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState("frontier");
  const ms=store.m3;

  useEffect(()=>{
    setTickers(store.tickers);
    setWeights(weightsFromEntries(store.portfolioEntries,store.tickers));
    setRf(+(store.riskFreeRate*100).toFixed(4));
  },[store.tickers,store.portfolioEntries,store.riskFreeRate]);

  function syncTickers(next) {
    const n=next.slice(0,MAX_ENTRIES);
    setTickers(n); setWeights(weightsFromEntries(store.portfolioEntries,n));
    setState({tickers:n,portfolioEntries:alignEntries(n,store.portfolioEntries)});
  }
  function importCsv(parsed) {
    setTickers(parsed.tickers); setWeights(weightsFromEntries(parsed.entries,parsed.tickers));
    setState({tickers:parsed.tickers,portfolioEntries:parsed.entries});
  }
  async function run() {
    setLoading(true); setError(null); setStatus("m3","loading");
    try {
      const tot=weights.reduce((a,b)=>a+b,0);
      const res=await apiPost("/api/m3/optimize",{tickers,current_weights:weights.map(w=>w/tot),period,risk_free_rate:rf/100});
      setModule("m3",res);
    } catch(e) { setError(e.message); setStatus("m3","error"); }
    setLoading(false);
  }
  const d=ms.result;
  const PERIODS=[{value:"6mo",label:"6M"},{value:"1y",label:"1Y"},{value:"2y",label:"2Y"},{value:"5y",label:"5Y"}];

  return (
    <div className="page fade-in">
      <div className="page-header">
        <h1 className="page-title">Performance <span>&amp; Risk</span></h1>
        <p className="page-sub">Efficient frontier, VaR, CVaR, drawdown analysis, and factor decomposition.</p>
        <div className="page-divider"/>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{marginBottom:12}}><CsvImport onImport={importCsv}/></div>
        <div className="form-grid" style={{marginBottom:12}}>
          <div style={{gridColumn:"1 / -1"}}>
            <label>Tickers</label>
            <TickerInput tickers={tickers} onChange={syncTickers}/>
          </div>
          <div>
            <label>Period</label>
            <ToggleGroup options={PERIODS} value={period} onChange={setPeriod}/>
          </div>
          <div>
            <label>Risk-Free Rate: {rf.toFixed(1)}%</label>
            <input type="range" min="0" max="15" step="0.5" value={rf} onChange={e=>setRf(+e.target.value)}/>
          </div>
        </div>
        <div className="stack-sm" style={{marginBottom:12}}>
          <label>Current Weights (%)</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {tickers.map((t,i)=>(
              <div key={t} style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)",width:110}}>{t}</span>
                <input type="number" value={(weights[i]||0).toFixed(1)} onChange={e=>{const w=[...weights];w[i]=+e.target.value;setWeights(w);}} style={{width:70}} min={0} max={100}/>
              </div>
            ))}
          </div>
        </div>
        <button className="btn btn-primary btn-full" onClick={run} disabled={loading||tickers.length<2}>
          {loading?"Running Analysis…":"Run Analysis"}
        </button>
      </div>

      {loading&&<Spinner msg="Optimising portfolio — computing covariance and efficient frontier…"/>}
      {error&&<ErrorBox msg={error} onRetry={run}/>}
      {d&&!loading&&(
        <div className="fade-in">
          <Tabs tabs={[{id:"frontier",label:"Risk vs Return"},{id:"allocations",label:"Suggested Mix"},{id:"risk",label:"Risk Metrics"},{id:"correlation",label:"Correlations"}]} active={tab} onChange={setTab}/>

          {tab==="correlation"&&(
            <div className="card" style={{overflowX:"auto"}}>
              <SectionLabel>Correlation Matrix</SectionLabel>

                <thead>
                  <tr><th></th>{d.tickers.map(t=><th key={t} className="td-center" style={{fontFamily:"var(--font-mono)",fontSize:9}}>{t.replace(".NS","")}</th>)}</tr>
                </thead>
                <tbody>

                    <tr key={row}>
                      <td style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text)"}}>{row.replace(".NS","")}</td>
                      {d.tickers.map(col=>{
                        const val=d.correlation_matrix[row]?.[col]??0;
                        const isDiag=row===col;
                        const bg=isDiag?"rgba(59,158,255,.1)":val>0?`rgba(0,212,160,${Math.abs(val)*.3})`:`rgba(255,79,109,${Math.abs(val)*.3})`;
                        return <td key={col} className="corr-cell" style={{background:bg,color:"var(--text)"}}>{val.toFixed(2)}</td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );

  const [weights,setWeights]=useState(()=>weightsFromEntries(store.portfolioEntries,store.tickers));

  const [custom,setCustom]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [expanded,setExpanded]=useState(null);

          <div><label>Horizon 2 (days)</label><input type="number" value={h2} onChange={e=>setH2(+e.target.value)}/></div>
        </div>
        <div style={{marginBottom:12}}>

        <button className="btn btn-sm btn-ghost" style={{marginBottom:12}} onClick={()=>setShowAdv(!showAdv)}>
          {showAdv?"▲":"▼"} Advanced Settings
        </button>
        {showAdv&&(
          <div className="form-grid" style={{marginBottom:12}}>
            <div><label>HMM Restarts</label><input type="number" value={restarts} onChange={e=>setRestarts(+e.target.value)} min={1} max={10}/></div>
            <div><label>Max Iterations</label><input type="number" value={maxIter} onChange={e=>setMaxIter(+e.target.value)} min={50} max={1000}/></div>
            <div><label>GARCH Samples</label><input type="number" value={garchBoot} onChange={e=>setGarchBoot(+e.target.value)} min={50} max={2000}/></div>
            <div><label>Uncertainty Bootstrap</label><input type="number" value={uncBoot} onChange={e=>setUncBoot(+e.target.value)} min={50} max={2000}/></div>
          </div>
        )}
        <button className="btn btn-primary btn-full" onClick={run} disabled={loading||tickers.length<2}>{loading?"Analysing…":"Run Analysis"}</button>
        <p style={{fontSize:11,color:"var(--warning)",marginTop:8}}>⚠ This analysis typically takes 15–30 seconds.</p>
      </div>

      {loading&&<Spinner msg="Fitting Hidden Markov Model to live price data…"/>}
      {error&&<ErrorBox msg={error} onRetry={run}/>}
      {d&&!loading&&(
        <div className="fade-in">
          <Tabs tabs={[{id:"status",label:"Market State"},{id:"transition",label:"State Transitions"},{id:"garch",label:"Volatility Outlook"},{id:"forward",label:"Return Outlook"},{id:"params",label:"Strategy Tuning"},{id:"weights",label:"Weights & Confidence"}]} active={tab} onChange={setTab}/>

          {tab==="status"&&(
            <div className="stack">

                  <span className={`regime-badge ${regBadge(d.current_regime)}`} style={{fontSize:18,padding:"8px 20px"}}>

              <div className="g3">

                <MetricCard label="30-Day Forecast" value={fmtPct(d.garch_30d_forecast)}/>

                        return <td key={to} className="tm-cell" style={{background:isDiag?`rgba(59,158,255,${alpha})`:`rgba(0,212,160,${alpha*.5})`,color:"var(--text)"}}>{fmtPct(v,1)}</td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {tab==="garch"&&(
            <div className="stack">
              <div className="g4">
                <MetricCard label="Current GARCH Vol" value={fmtPct(d.garch_current_vol)}/>
                <MetricCard label="30-Day Forecast" value={fmtPct(d.garch_30d_forecast)}/>

                </div>

            </div>

          {tab==="forward"&&(
            <div className="stack">
              {d.forward_returns&&Object.entries(d.forward_returns).map(([horizon,data])=>(

                  <div style={{fontSize:12,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>{horizon.replace(/_/g," ").replace("day","Day")}</div>

          {tab==="params"&&d.regime_parameters&&(

                <div key={regime} className="card">

                    <span className={`regime-badge ${regBadge(regime)}`}>{regIcon(regime)} {regime}</span>

                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab==="weights"&&(
            <div className="stack">
              {d.regime_weights&&(
                <div className="card">
                  <SectionLabel>Recommended Weights per Regime</SectionLabel>
                  {Object.entries(d.regime_weights).map(([regime,wts])=>(
                    <div key={regime} style={{marginBottom:16}}>
                      <div className="mc-label" style={{marginBottom:6}}>{regime}</div>
                      {Object.entries(wts).map(([ticker,w])=>(
                        <div key={ticker} className="sig-row">

                          <div className="sig-bar"><div className="sig-fill" style={{width:`${(w*100).toFixed(0)}%`,background:regCol(regime)}}/></div>

    try {
      const d=await apiGet("/api/auth/me");
      if (d?.user?.username) { localStorage.setItem(AUTH_PROFILE,JSON.stringify(d.user)); setAuthUser(d.user); setAuthError(""); return true; }
    } catch(e) { setAuthError(e?.message||"Auth failed."); }
    localStorage.removeItem(AUTH_TOKEN); localStorage.removeItem(AUTH_PROFILE); setAuthUser(null); return false;
  },[]);

  useEffect(()=>{
    function clear() { localStorage.removeItem(AUTH_TOKEN); localStorage.removeItem(AUTH_PROFILE); setAuthUser(null); }
    window.addEventListener("cv-auth-expired",clear);
    const t=localStorage.getItem(AUTH_TOKEN);
    if (!t) { setBooting(false); return ()=>window.removeEventListener("cv-auth-expired",clear); }
    refreshAuth().finally(()=>setBooting(false));
    return()=>window.removeEventListener("cv-auth-expired",clear);
  },[refreshAuth]);

  function onAuth(payload) {
    const t=payload?.token||""; const u=payload?.user||null;
    if (!t||!u) { setAuthError("Invalid authentication response."); return; }
    localStorage.setItem(AUTH_TOKEN,t); localStorage.setItem(AUTH_PROFILE,JSON.stringify(u));
    setAuthUser(u); setAuthError("");
  }

  function onLogout() { localStorage.removeItem(AUTH_TOKEN); localStorage.removeItem(AUTH_PROFILE); setAuthUser(null); setPage("dashboard"); }

  if (booting) return (
    <div style={{height:"100vh",display:"grid",placeItems:"center",background:"var(--bg)"}}>
      <div style={{textAlign:"center"}}>
        <div className="spinner" style={{margin:"0 auto 12px"}}/>
        <p style={{fontSize:13,color:"var(--text3)"}}>Restoring session…</p>
      </div>
    </div>
  );

  if (!authUser) return <LoginGate onAuthenticated={onAuth} authError={authError}/>;

  const NAV=[
    {id:"dashboard",label:"Executive Dashboard",icon:"⌂",mod:null},
    {id:"portfolio",label:"Performance & Risk",icon:"◎",mod:"m3"},
    {id:"stress",label:"Stress Scenarios",icon:"⚡",mod:"m4"},
    {id:"optimisation",label:"Allocation Strategy",icon:"⬡",mod:"m5"},
    {id:"trade",label:"Trade & Security",icon:"🔐",mod:"m6"},
    {id:"regime",label:"Regime Outlook",icon:"◉",mod:"m7"},
    {id:"settings",label:"Settings",icon:"⚙",mod:null},
  ];

  const PAGES={dashboard:Dashboard,portfolio:Portfolio,stress:StressTest,optimisation:Optimisation,trade:Trade,regime:Regime,settings:Settings};
  const PageCmp=PAGES[page]||Dashboard;

  const titles={dashboard:"Executive Dashboard",portfolio:"Performance & Risk",stress:"Stress Scenarios",
    optimisation:"Allocation Strategy",trade:"Trade & Security",regime:"Regime Outlook",settings:"Settings"};

  return (
    <div className="shell">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sb-top">
          <div className="logo">
            <div className="logo-icon">CV</div>
            <div>
              <div className="logo-text">ClearView</div>
              <div className="logo-sub">ANALYTICS</div>
            </div>
          </div>
        </div>
        <div className="nav-body">
          <div className="nav-section-label">Modules</div>
          {NAV.map(n=>{
            const status=n.mod?store[n.mod]?.status:null;
            return (
              <div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                <span style={{flex:1}}>{n.label}</span>
                {status&&<div className={`nav-status ${status}`}/>}
              </div>
            );
          })}
        </div>
        <div className="sb-bottom">
          <div className="backend-status">
            <div className={`bs-dot ${store.backendOnline?"online":"offline"}`}/>
            <span className="bs-text">{store.backendOnline?"Backend online":"Backend offline"}</span>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div className="main">
        {!store.backendOnline&&(
          <div className="offline-banner">
            ⚠ Backend unreachable. Check Settings to update your API URL.
          </div>
        )}
        <header className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          <div className="topbar-pills">
            {store.tickers.map(t=><span key={t} className="ticker-pill">{t}</span>)}
          </div>
          <div className="topbar-right">
            <div className="user-chip">
              <div className="user-avatar">{(authUser?.username||"U").charAt(0).toUpperCase()}</div>
              {(authUser?.username||authUser?.name||authUser?.email||"").trim()}
            </div>
            <button className="btn btn-sm btn-outline" onClick={onLogout}>Sign Out</button>
          </div>
        </header>
        <div className="content">
          <PageCmp setPage={setPage} authUser={authUser} onLogout={onLogout}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
