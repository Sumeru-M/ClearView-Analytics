services:
  - type: web
    name: clearview-analytics
    env: python
    plan: standard
    pythonVersion: 3.11
    
    # Build configuration
    buildCommand: pip install -r requirements.txt
    startCommand: "gunicorn --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 src.main:app"
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: AUTH_SECRET
        scope: runtime
      - key: CORS_ORIGINS
        value: "*"
        scope: runtime
      - key: SUPABASE_URL
        scope: runtime
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: runtime
      - key: PYTHON_VERSION
        value: "3.11"
        scope: runtime
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Health check
    healthCheckPath: /api/health
